log:
  level: INFO
  format: json

accessLog:
  filePath: "/var/log/traefik/access.log"
  bufferingSize: 100
  fields:
    defaultMode: keep
    names:
      ClientUsername: drop
      StartUTC: drop
  filters:
    statusCodes: ["400-599"]
