entryPoints:
  web:
    address: ":80"
providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

experimental:
  localPlugins:
    supabaseguard:
      moduleName: "github.com/GustavoMartins123/supabaseguard"
  plugins:
    geoblock:
      moduleName: "github.com/PascalMinder/geoblock"
      version: "v0.3.7"

global:
  checknewversion: false
  sendanonymoususage: false

log:
  level: INFO
  format: json

accessLog:
  filePath: "/var/log/traefik/access.log"
  bufferingSize: 100
  fields:
    defaultMode: keep
    names:
      ClientUsername: drop
      StartUTC: drop
  filters:
    statusCodes: ["400-599"]
