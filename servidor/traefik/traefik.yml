entryPoints:
  web:
    address: ":80"
  #   http:
  #     redirections:
  #       entryPoint:
  #         to: websecure
  #         scheme: https
  # websecure:
  #   address: ":443"
providers:
  docker:
    exposedByDefault: false
  file:
    filename: /etc/traefik/dynamic/middlewares.yml
    watch: true

experimental:
  plugins:
    fail2ban:
      moduleName: "github.com/tomMoulard/fail2ban"
      version: "v0.8.3"
    geoblock:
      moduleName: "github.com/PascalMinder/geoblock"
      version: "v0.3.3"

