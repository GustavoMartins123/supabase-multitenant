x-vector-logging: &vector-logging
  driver: fluentd
  options:
    fluentd-address: ${VECTOR_FLUENTD_ADDRESS:-127.0.0.1:24224}
    fluentd-async: "true"
    fluentd-sub-second-precision: "true"

services:
  traefik-config-watcher:
    image: ${TRAEFIK_CONFIG_IMAGE}
    container_name: supabase-traefik-config-watcher
    restart: unless-stopped
    logging: *vector-logging
    command:
      - python
      - /app/render_dynamic_config.py
      - --watch
      - --root-env
      - /config/server.env
      - --projects-dir
      - /projects
      - --middlewares-file
      - /config/middlewares.yml
      - --output
      - /dynamic/routes.yml
    volumes:
      - ./render_dynamic_config.py:/app/render_dynamic_config.py:ro
      - ../.env:/config/server.env:ro
      - ../projects:/projects:ro
      - ./middlewares.yml:/config/middlewares.yml:ro
      - ./dynamic:/dynamic
    networks:
      - rede-supabase
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "from pathlib import Path; raise SystemExit(0 if Path('/dynamic/routes.yml').is_file() and Path('/dynamic/00-middlewares.yml').is_file() else 1)"]
      interval: 5s
      timeout: 3s
      retries: 5

  traefik:
    image: ${TRAEFIK_IMAGE}
    working_dir: /
    ports:
      - "${TRAEFIK_HTTP_PORT}:80"
      - "${TRAEFIK_HTTPS_PORT}:443"
    environment:
      - TZ=${TZ}
    depends_on:
      traefik-config-watcher:
        condition: service_healthy
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./acme.json:/acme.json
      - ./access.log:/var/log/traefik/access.log
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./plugins-local:/plugins-local:ro
      - ./plugins-storage:/plugins-storage
    networks:
      - rede-supabase
    restart: unless-stopped
    logging: *vector-logging

  geoip-api:
    build: ./geoip
    volumes:
      - ./geoip/GeoLite2-Country.mmdb:/data/GeoLite2-Country.mmdb:ro
    networks:
      - rede-supabase
    restart: unless-stopped
    logging: *vector-logging

  deny-service:
    image: ${TRAEFIK_DENY_IMAGE}
    container_name: traefik-deny-service
    networks:
      - rede-supabase
    volumes:
      - ./deny/default.conf:/etc/nginx/conf.d/default.conf:ro
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    logging: *vector-logging

networks:
  rede-supabase:
    external: true
