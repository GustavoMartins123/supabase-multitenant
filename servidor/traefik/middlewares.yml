http:
  routers:
    malicious-paths:
      rule: "PathPrefix(`/admin`) || PathPrefix(`/wp-admin`) || PathPrefix(`/phpmyadmin`) || PathPrefix(`/cgi-bin`) || PathPrefix(`/.env`) || PathPrefix(`/.git`) || PathPrefix(`/xmlrpc`) || PathPrefix(`/server-status`) || PathPrefix(`/phpinfo.php`) || PathPrefix(`/actuator`) || PathPrefix(`/global-protect`) || PathPrefix(`/ssl-vpn`) || PathPrefix(`/+CSCOE+`) || PathPrefix(`/login.htm`) || PathPrefix(`/login.html`) || PathPrefix(`/login.jsp`) || PathPrefix(`/remote/login`) || PathPrefix(`/manage/account`) || PathPrefix(`/webpages/login`) || PathPrefix(`/doc/index.html`) || PathPrefix(`/owa/auth`) || PathPrefix(`/getcfg.php`) || PathPrefix(`/aws.sh`) || PathPrefix(`/vb.env`) || PathPrefix(`/env.py`)"
      entryPoints:
        - web
      priority: 2000
      middlewares:
        - malicious-paths-chain
      service: forbidden-service
    block-bad-useragents:
      rule: "HeaderRegexp(`User-Agent`, `.*[Bb]ot.*|.*[Ss]canner.*|.*[Cc]rawler.*|.*[Ss]pider.*|.*[Cc]url.*|.*[Ww]get.*|.*ruby.*|.*perl.*|.*masscan.*|.*nmap.*|^-?$`)"
      entryPoints:
        - web
      priority: 1900
      middlewares:
        - suspicious-paths-chain
      service: forbidden-service
    http-catchall:
      rule: "HostRegexp(`{host:.+}`)"
      entryPoints:
        - web
      priority: 100
      middlewares:
        - security-chain-enhanced
      service: noop@internal
    leaked-files:
      rule: "PathRegexp(`(?i)^/(?:[^/]+/)*(?:\\.env[^/]*|\\.git|\\.svn|\\.hg|\\.bzr|\\.htaccess|\\.htpasswd)(?:/|$|[.?~_-].*)`)"
      entryPoints:
        - web
      priority: 5000
      middlewares:
        - hide-deny-headers
        - rate-limit-malicious
        - supabase-guard-malicious
      service: forbidden-service
  middlewares:
    hide-deny-headers:
      headers:
        customResponseHeaders:
          Server: ""
          X-Powered-By: ""
          X-AspNet-Version: ""
          X-AspNetMvc-Version: ""
    security-headers:
      headers:
        customResponseHeaders:
          X-Frame-Options: "DENY"
          X-Content-Type-Options: "nosniff"
          X-XSS-Protection: "1; mode=block"
          Content-Security-Policy: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'"
          Referrer-Policy: "strict-origin-when-cross-origin"
    rate-limit:
       rateLimit:
         burst: 160
         average: 80
         period: "1s"
    rate-limit-global:
      rateLimit:
        burst: 10
        average: 5
        period: "1m"
        sourceCriterion:
          ipStrategy:
            depth: 1
    rate-limit-malicious:
      rateLimit:
        burst: 2
        average: 1
        period: "1m"
        sourceCriterion:
          ipStrategy:
            depth: 1
    rate-limit-suspicious:
      rateLimit:
        burst: 1
        average: 1
        period: "5m"
        sourceCriterion:
          ipStrategy:
            depth: 1
    rate-limit-api-internal:
      rateLimit:
        burst: 50
        average: 20
        period: "1s"
        sourceCriterion:
          ipStrategy:
            depth: 1        
    geoblock-global:
      plugin:
        geoblock:
          cachesize: 2000
          silentStartUp: false
          allowLocalRequests: true
          logApiRequests: true
          api: http://geoip-api:8000/v1/ip/country/{ip}
          apiTimeoutMs: 1000
          allowUnknownCountries: false
          countries: BR
    block-bad-agents:
      headers:
        customRequestHeaders:
          X-Block-Bad-Agents: "true"
        forceSTSHeader: true

    block-sensitive-files:
      replacePathRegex:
        regex: '(?i)^/.*(/|^)(\.env[^/]*|\.git|\.svn|\.hg|\.bzr|\.htaccess|\.htpasswd|config\.(json|ya?ml|php)|phpinfo\.php|info\.php|debug\.php|\.DS_Store|Thumbs\.db|aws\.sh|vb\.env|env\.py)(/|$|[.?~_-].*)'
        replacement: "/blocked"

    block-sensitive-prefixes:
      replacePathRegex:
        regex: '(?i)^/(admin|administrator|login|wp-admin|wp-login\.php|phpmyadmin|pma|mysql|setup|install|server-status|debug|debug/pprof|metrics|actuator|xmlrpc|cgi-bin|global-protect|ssl-vpn|owa/auth|getcfg\.php|remote/login|remote/logincheck|geoserver)(/|$|.*)'
        replacement: "/blocked"

    supabase-guard-malicious:
      plugin:
        supabaseguard:
          profile: malicious
          mode: enforce
          scope: global-malicious
          maxTrackedClients: 50000
          cleanupInterval: 5m
          scannerThreshold: 2
          scannerWindow: 2m
          scannerBanTime: 1h

    api-security-chain:
      chain:
        middlewares:
          - rate-limit-api-internal
          - security-headers
    malicious-paths-chain:
      chain:
        middlewares:
          - block-bad-agents
          - geoblock-global
          - rate-limit-malicious
          - supabase-guard-malicious
    suspicious-paths-chain:
      chain:
        middlewares:
          - block-bad-agents
          - geoblock-global
          - rate-limit-suspicious
          - supabase-guard-malicious
    security-chain-enhanced:
      chain:
        middlewares:
          - geoblock-global
          - rate-limit-global
          - supabase-guard-malicious
          - security-headers
  services:
    forbidden-service:
      loadBalancer:
        servers:  
          - url: "http://deny-service:8080"
