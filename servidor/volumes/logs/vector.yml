api:
  enabled: true
  address: 0.0.0.0:9001

sources:
  fluent_logs:
    type: fluent
    address: 0.0.0.0:24224

transforms:
  project_logs:
    type: remap
    inputs: [fluent_logs]
    source: |-
      .event_message = del(.log)
      if .event_message == null {
        .event_message = del(.message)
      }
      if .event_message == null {
        .event_message = ""
      }

      .appname = del(.container_name)
      if .appname == null {
        .appname = del(.tag)
      }
      if .appname == null {
        .appname = "unknown"
      }
      .appname = replace!(string!(.appname), r'^/', "")
      .project = "default"
      .tenant_project = "global"

      project_match, project_err = parse_regex(
        string!(.appname),
        r'^supabase-(?:auth|rest|storage|nginx|imgproxy)-(?P<ref>[a-z_][a-z0-9_]{2,39})$'
      )
      if project_err == null && project_match.ref != null {
        .tenant_project = project_match.ref
        .project = project_match.ref
      }

      del(.container_created_at)
      del(.container_id)
      del(.source_type)
      del(.stream)
      del(.label)
      del(.image)
      del(.host)

  router:
    type: route
    inputs: [project_logs]
    route:
      auth: 'starts_with(string!(.appname), "supabase-auth-")'
      rest: 'starts_with(string!(.appname), "supabase-rest-")'
      storage: 'starts_with(string!(.appname), "supabase-storage-")'
      realtime: '.appname == "realtime-dev.supabase-realtime"'
      functions: '.appname == "supabase-edge-functions"'
      db: '.appname == "supabase-db"'
      gateway: >-
        starts_with(string!(.appname), "supabase-nginx-") ||
        starts_with(string!(.appname), "traefik") ||
        includes([
          "nginx",
          "authelia",
          "projects-api",
          "supabase-studio",
          "supabase-pooler",
          "traefik-deny-service"
        ], string!(.appname))

  auth_logs:
    type: remap
    inputs: [router.auth]
    source: |-
      parsed, err = parse_json(.event_message)
      if err == null {
        .metadata = parsed
        .metadata.project = .project
        .metadata.tenant_project = .tenant_project
      } else {
        .metadata.project = .project
        .metadata.tenant_project = .tenant_project
      }

  rest_logs:
    type: remap
    inputs: [router.rest]
    source: |-
      .metadata.host = .project
      .metadata.tenant_project = .tenant_project
      parsed, err = parse_regex(.event_message, r'^(?P<time>.*): (?P<msg>.*)$')
      if err == null {
        .event_message = parsed.msg
        parsed_ts, parsed_ts_err = parse_timestamp(
          parsed.time,
          format: "%d/%b/%Y:%H:%M:%S %z"
        )
        if parsed_ts_err == null {
          .timestamp = parsed_ts
        }
      }

  storage_logs:
    type: remap
    inputs: [router.storage]
    source: |-
      .metadata.project = .project
      .metadata.tenant_project = .tenant_project
      .metadata.tenantId = .tenant_project
      parsed, err = parse_json(.event_message)
      if err == null {
        if parsed.msg != null {
          .event_message = parsed.msg
        }
        .metadata.level = parsed.level
        .metadata.timestamp = parsed.time
      }

  realtime_logs:
    type: remap
    inputs: [router.realtime]
    source: |-
      .metadata.project = .project
      .metadata.tenant_project = .tenant_project
      .metadata.external_id = .tenant_project
      parsed, err = parse_regex(
        .event_message,
        r'^(?P<time>\d+:\d+:\d+\.\d+) \[(?P<level>\w+)\] (?P<msg>.*)$'
      )
      if err == null {
        .event_message = parsed.msg
        .metadata.level = parsed.level
      }

  functions_logs:
    type: remap
    inputs: [router.functions]
    source: |-
      .metadata.project_ref = .project
      .metadata.tenant_project = .tenant_project

  db_logs:
    type: remap
    inputs: [router.db]
    source: |-
      .metadata.parsed.timestamp = .timestamp

      db_context, db_context_err = parse_regex(
        string!(.event_message),
        r'user=(?P<user_name>[^,]*),db=(?P<database_name>[^,]*),app=(?P<application_name>[^,]*),client=(?P<client>[^ ]*)'
      )
      if db_context_err == null {
        .metadata.parsed.user_name = db_context.user_name
        .metadata.parsed.database_name = db_context.database_name
        .metadata.parsed.application_name = db_context.application_name
        .metadata.parsed.client = db_context.client

        project_db, project_db_err = parse_regex(
          string!(db_context.database_name),
          r'^_supabase_(?P<ref>[a-z_][a-z0-9_]{2,39})$'
        )
        if project_db_err == null && project_db.ref != null {
          .project = project_db.ref
          .tenant_project = project_db.ref
        }
      }

      .metadata.host = "db-" + string!(.tenant_project)
      parsed, err = parse_regex(
        .event_message,
        r'.*(?P<level>INFO|NOTICE|WARNING|ERROR|LOG|FATAL|PANIC):.*'
      )
      if err == null && parsed.level != null {
        .metadata.parsed.error_severity = upcase!(parsed.level)
      } else {
        .metadata.parsed.error_severity = "LOG"
      }

  gateway_logs:
    type: remap
    inputs: [router.gateway]
    source: |-
      .metadata.project = .project
      .metadata.tenant_project = .tenant_project
      .metadata.service = .appname

      request, request_err = parse_nginx_log(.event_message, "combined")
      if request_err == null {
        .timestamp = request.timestamp
        .metadata.request.headers.referer = request.referer
        .metadata.request.headers.user_agent = request.agent
        .metadata.request.headers.x_real_ip = request.client
        .metadata.response.status_code = request.status

        request_parts, request_parts_err = split(request.request, " ")
        if request_parts_err == null && length(request_parts) == 3 {
          .metadata.request.method = request_parts[0]
          .metadata.request.protocol = request_parts[2]

          request_target, request_target_err = parse_regex(
            request_parts[1],
            r'^(?P<path>[^?]*)(?:\?(?P<search>.*))?$'
          )
          if request_target_err == null {
            .metadata.request.path = request_target.path
            .metadata.request.search = request_target.search
          }
        }
      }

sinks:
  logflare_auth:
    type: http
    inputs: [auth_logs]
    encoding: { codec: json }
    method: post
    request:
      retry_max_duration_secs: 30
      retry_initial_backoff_secs: 1
    headers:
      x-api-key: ${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}
    uri: http://analytics:4000/api/logs?source_name=gotrue.logs.prod

  logflare_rest:
    type: http
    inputs: [rest_logs]
    encoding: { codec: json }
    method: post
    request:
      retry_max_duration_secs: 30
      retry_initial_backoff_secs: 1
    headers:
      x-api-key: ${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}
    uri: http://analytics:4000/api/logs?source_name=postgREST.logs.prod

  logflare_storage:
    type: http
    inputs: [storage_logs]
    encoding: { codec: json }
    method: post
    request:
      retry_max_duration_secs: 30
      retry_initial_backoff_secs: 1
    headers:
      x-api-key: ${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}
    uri: http://analytics:4000/api/logs?source_name=storage.logs.prod.2

  logflare_realtime:
    type: http
    inputs: [realtime_logs]
    encoding: { codec: json }
    method: post
    request:
      retry_max_duration_secs: 30
      retry_initial_backoff_secs: 1
    headers:
      x-api-key: ${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}
    uri: http://analytics:4000/api/logs?source_name=realtime.logs.prod

  logflare_functions:
    type: http
    inputs: [functions_logs]
    encoding: { codec: json }
    method: post
    request:
      retry_max_duration_secs: 30
      retry_initial_backoff_secs: 1
    headers:
      x-api-key: ${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}
    uri: http://analytics:4000/api/logs?source_name=deno-relay-logs

  logflare_db:
    type: http
    inputs: [db_logs]
    encoding: { codec: json }
    method: post
    request:
      retry_max_duration_secs: 30
      retry_initial_backoff_secs: 1
    headers:
      x-api-key: ${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}
    uri: http://analytics:4000/api/logs?source_name=postgres.logs

  logflare_gateway:
    type: http
    inputs: [gateway_logs]
    encoding: { codec: json }
    method: post
    request:
      retry_max_duration_secs: 30
      retry_initial_backoff_secs: 1
    headers:
      x-api-key: ${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}
    uri: http://analytics:4000/api/logs?source_name=cloudflare.logs.prod
