  #     PUSH_VERIFY_TLS: ${PUSH_VERIFY_TLS}
  #     PUSH_CA_FILE: ${PUSH_CA_FILE}
  #   volumes:
  #     - ./certs:/docker/push-certs:ro
  #   command: ["python", "app/push_worker.py"]


networks:
  rede-supabase:
    external: true
  analytics-internal:
    name: ${ANALYTICS_NETWORK_NAME}
    external: true
