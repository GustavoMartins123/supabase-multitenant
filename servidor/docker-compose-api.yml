#docker compose -f docker-compose-api.yml --env-file .env up --build -d
services:
  projects-api:
    container_name: projects-api
    build: 
      context: .
      dockerfile: ./api-internal/Dockerfile
    restart: unless-stopped
    stop_grace_period: 4m
    networks: [rede-supabase]                # mesma bridge do restante
    expose: ["18000"]                         # visível APENAS na rede Docker :contentReference[oaicite:4]{index=4}
    environment:
      DB_DSN: postgres://supabase_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/postgres
      PROJECT_SECRETS_MASTER_KEY: ${PROJECT_SECRETS_MASTER_KEY}
      PROJECT_SECRETS_MASTER_KEY_ID: ${PROJECT_SECRETS_MASTER_KEY_ID:-project-secrets-master-v1}
      PROJECT_SECRETS_PREVIOUS_MASTER_KEYS: ${PROJECT_SECRETS_PREVIOUS_MASTER_KEYS:-}
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY}
      STUDIO_SERVICE_KEY_ENCRYPTION_KEY: ${STUDIO_SERVICE_KEY_ENCRYPTION_KEY}
      PROJECT_DELETE_PASSWORD: ${PROJECT_DELETE_PASSWORD}
      NGINX_SHARED_TOKEN: ${NGINX_SHARED_TOKEN}
      NGINX_HMAC_SECRET: ${NGINX_HMAC_SECRET:-}
      USER_TOKEN_MAX_CLOCK_SKEW_SECONDS: ${USER_TOKEN_MAX_CLOCK_SKEW_SECONDS:-30}
      PG_META_INTERNAL_URL: http://postgres-meta-global:8080
      PG_META_ALLOWED_HOSTS: postgres-meta-global
    volumes:
      - ./projects:/docker/projects:rw        # bind-mount relativo  :contentReference[oaicite:0]{index=0}
      - ./certs:/docker/push-certs:ro
      - ./.env:/docker/.env:ro
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.lanonly.ipallowlist.sourcerange=<SEU_IP>/32, 172.50.0.0/16
      - traefik.http.routers.projects.rule=PathPrefix(`/api/projects`) && (`X-Shared-Token`, `${NGINX_SHARED_TOKEN}`)
      - traefik.http.routers.projects.middlewares=lanonly, api-security-chain@file
      - traefik.http.services.projects.loadbalancer.server.port=18000  
  postgres-meta-global:
    container_name: postgres-meta-global
    image: supabase/postgres-meta:v0.96.1
    restart: unless-stopped
    networks: [rede-supabase]
    expose: ["8080"]
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: ${POSTGRES_HOST}
      PG_META_DB_PORT: ${POSTGRES_PORT}
      PG_META_DB_NAME: meta_trap
      PG_META_DB_USER: meta_guest
      PG_META_DB_PASSWORD: ${META_GUEST_PASSWORD}
      CRYPTO_KEY: ${PG_META_CRYPTO_KEY}
