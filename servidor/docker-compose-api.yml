# docker compose -f docker-compose-api.yml -f docker-compose.single-node.yml --env-file .env up --build -d
x-vector-logging: &vector-logging
  driver: fluentd
  options:
    fluentd-address: ${VECTOR_FLUENTD_ADDRESS:-127.0.0.1:24224}
    fluentd-async: "true"
    fluentd-sub-second-precision: "true"

services:
  projects-api:
    container_name: projects-api
    build: 
      context: .
      dockerfile: ./api-internal/Dockerfile
    restart: unless-stopped
    logging: *vector-logging
    stop_grace_period: ${PROJECTS_API_STOP_GRACE_PERIOD}
    env_file:
      - .analytics.env
    networks: [rede-supabase, analytics-internal]
    expose: ["${PROJECTS_API_PORT}"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18000/healthz', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      HOST_AGENT_HMAC_SECRET: ${HOST_AGENT_HMAC_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      PROJECT_SECRETS_MASTER_KEY: ${PROJECT_SECRETS_MASTER_KEY}
      PROJECT_SECRETS_MASTER_KEY_ID: ${PROJECT_SECRETS_MASTER_KEY_ID}
      PROJECT_SECRETS_PREVIOUS_MASTER_KEYS: ${PROJECT_SECRETS_PREVIOUS_MASTER_KEYS}
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY}
      STUDIO_SERVICE_KEY_ENCRYPTION_KEY: ${STUDIO_SERVICE_KEY_ENCRYPTION_KEY}
      PROJECT_DELETE_PASSWORD: ${PROJECT_DELETE_PASSWORD}
      NGINX_SHARED_TOKEN: ${NGINX_SHARED_TOKEN}
      NGINX_HMAC_SECRET: ${NGINX_HMAC_SECRET}
      USER_TOKEN_MAX_CLOCK_SKEW_SECONDS: ${USER_TOKEN_MAX_CLOCK_SKEW_SECONDS}
      KEY_EXPIRY_WARNING_DAYS: ${KEY_EXPIRY_WARNING_DAYS}
      STUDIO_CACHE_INVALIDATION_URL: https://nginx:443
      STUDIO_CACHE_INVALIDATION_VERIFY_TLS: ${STUDIO_CACHE_INVALIDATION_VERIFY_TLS:-true}
      STUDIO_CACHE_INVALIDATION_CA_FILE: ${STUDIO_CACHE_INVALIDATION_CA_FILE:-/docker/push-certs/ca.pem}
      PG_META_INTERNAL_URL: http://postgres-meta-global:8080
      PG_META_ALLOWED_HOSTS: postgres-meta-global
      ANALYTICS_INTERNAL_URL: http://analytics:4000
    volumes:
      - ./projects:/docker/projects:rw        # bind-mount relativo  :contentReference[oaicite:0]{index=0}
      - ./certs:/docker/push-certs:ro
      - ./.env:/docker/.env:ro
  postgres-meta-global:
    container_name: postgres-meta-global
    image: ${PG_META_IMAGE}
    restart: unless-stopped
    logging: *vector-logging
    networks: [rede-supabase]
    expose: ["${PG_META_PORT}"]
    environment:
      PG_META_PORT: ${PG_META_PORT}
      PG_META_DB_HOST: ${POSTGRES_HOST}
      PG_META_DB_PORT: ${POSTGRES_PORT}
      PG_META_DB_NAME: meta_trap
      PG_META_DB_USER: meta_guest
      PG_META_DB_PASSWORD: ${META_GUEST_PASSWORD}
      CRYPTO_KEY: ${PG_META_CRYPTO_KEY}
  # push-worker:
  #   container_name: push-worker
  #   build:
  #     context: .
  #     dockerfile: ./api-internal/Dockerfile
  #   restart: unless-stopped
  #   networks: [rede-supabase]
