services:
  projects-api:
    environment:
      DOCKER_HOST: tcp://lifecycle-docker-proxy:2375
      DOCKER_TLS_VERIFY: ""
      DOCKER_CERT_PATH: ""
    depends_on:
      lifecycle-docker-proxy:
        condition: service_healthy
    networks:
      - rede-supabase
      - analytics-internal
      - lifecycle-docker-api

  lifecycle-docker-proxy:
    image: ${DOCKER_SOCKET_PROXY_IMAGE}
    container_name: supabase-lifecycle-docker-proxy
    restart: unless-stopped
    environment:
      ALLOW_RESTARTS: "1"
      AUTH: "0"
      BUILD: "1"
      COMMIT: "1"
      CONFIGS: "0"
      CONTAINERS: "1"
      DISTRIBUTION: "0"
      EVENTS: "1"
      EXEC: "1"
      IMAGES: "1"
      INFO: "1"
      NETWORKS: "1"
      NODES: "0"
      PING: "1"
      PLUGINS: "0"
      POST: "1"
      SECRETS: "0"
      SERVICES: "0"
      SESSION: "1"
      SWARM: "0"
      SYSTEM: "1"
      TASKS: "0"
      VERSION: "1"
      VOLUMES: "1"
      LOG_LEVEL: warning
    volumes:
      - ${DOCKER_SOCKET_LOCATION}:/var/run/docker.sock
    networks:
      - lifecycle-docker-api
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:2375/_ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  lifecycle-docker-api:
    name: supabase-lifecycle-docker-api
    driver: bridge
    internal: true
