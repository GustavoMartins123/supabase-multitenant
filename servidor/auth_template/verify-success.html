<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Aceito</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: scaleIn 0.5s ease-out;
        }
        .success-icon::after {
            content: '✓';
            color: white;
            font-size: 48px;
            font-weight: bold;
        }
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 16px;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 12px;
        }
        .info {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 20px;
            margin-top: 24px;
        }
        .info p {
            margin: 0;
            font-size: 14px;
        }
        .muted {
            margin-top: 16px;
            font-size: 14px;
            color: #94a3b8;
        }
        .hidden {
            display: none;
        }
        .error-icon {
            background: #ef4444;
        }
        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="icon" class="success-icon"></div>
        <h1 id="title">Confirmando seu convite...</h1>
        <p id="description">Estamos validando o link de acesso.</p>
        <p id="secondary">Aguarde alguns segundos.</p>
        <div id="details" class="info hidden">
            <p><strong>Próximos passos:</strong></p>
            <p>Use suas credenciais para acessar o sistema.</p>
        </div>
        <p id="muted" class="muted">Se esta página não continuar automaticamente, abra novamente o convite pelo e-mail.</p>
    </div>
    <script src="verify-success.js"></script>
</body>
</html>
