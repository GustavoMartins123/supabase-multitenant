<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirme seu E-mail</title>
    <style>
        body { margin: 0; padding: 24px; background: #f4f7fb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1f2937; }
        .card { max-width: 620px; margin: 0 auto; background: #ffffff; border-radius: 16px; padding: 32px; box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08); }
        .badge { display: inline-block; padding: 6px 12px; border-radius: 999px; background: #f0fdf4; color: #15803d; font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
        h1 { margin: 16px 0 12px; font-size: 28px; line-height: 1.2; color: #111827; }
        p { margin: 0 0 16px; font-size: 16px; line-height: 1.6; color: #4b5563; }
        .button { display: inline-block; padding: 14px 22px; margin: 12px 0 24px; background: #16a34a; color: #ffffff !important; text-decoration: none; border-radius: 10px; font-weight: 700; }
        .footer { font-size: 14px; color: #6b7280; border-top: 1px solid #f1f5f9; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <span class="badge">Cadastro</span>
        <h1>Bem-vindo!</h1>
        <p>Sua conta foi criada, mas precisamos confirmar que este e-mail pertence a você. Clique no botão abaixo para ativar seu acesso.</p>
        <a href="{{ if .RedirectTo }}{{ .RedirectTo }}?token={{ .TokenHash }}&type=signup{{ else }}{{ .SiteURL }}?token={{ .TokenHash }}&type=signup{{ end }}" class="button">Confirmar Cadastro</a>
        <p class="footer">Se você não criou uma conta em nosso sistema, por favor ignore este e-mail.</p>
    </div>
</body>
</html>
