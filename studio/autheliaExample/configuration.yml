# ↓ 1) endereço no novo formato
server:
  address: tcp://0.0.0.0:9091/
  # TLS autoassinado
  tls:
    certificate: /config/ssl/public.crt
    key:         /config/ssl/private.pem  # garanta MESMO nome no disco

log:
  level: info

#docker run --rm authelia/authelia:4.39 authelia crypto rand --length 64 --charset alphanumeric
identity_validation:
  reset_password:
    jwt_secret: "pass"
    jwt_lifespan: '5 minutes'
    jwt_algorithm: 'HS256'
# ↓ 2) sessão multi-domain (substitui `session.domain`)
session:
  cookies:
    - name: authelia_session
      domain: <SEU_IP>       
      authelia_url: https://<SEU_IP>:9091
      default_redirection_url: https://<SEU_IP>:4000
      same_site: lax
  secret: "pass"
  expiration: '24h'
  inactivity: '3h'
# ↓ 3) storage com encryption_key obrigatório
#openssl rand -hex 96
storage:
  local:
    path: /config/db.sqlite3
  encryption_key: "pass"

authentication_backend:
  file:
    path: /config/users_database.yml
    watch: true
    search:
      email: true
      case_insensitive: true


access_control:
  default_policy: deny
  rules:
    - domain: "<SEU_IP>"
      policy: one_factor
      subject:
      - ["group:active"]
    # - domain: "studio.local"
    #   policy: one_factor

notifier:
  smtp:
    address: 'submission://smtp.gmail.com:587'
    timeout: '10s'
    username: 'exemplo'
    password: 'exemplo'
    sender: "Exemplo<exemplo@example.com>"
    identifier: 'exemplo'
    subject: "[Authelia] {title}"
    startup_check_address: 'exemplo@example.com'