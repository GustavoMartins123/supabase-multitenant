#docker compose up --build -d
services:
  usersdb-init:
    image: alpine
    command: >
        sh -c "cp -R /seed/* /config &&
              chown -R 65534:65534 /config &&
              echo 'usersdb preparado'"
    volumes:
      - ./authelia:/seed:ro 
      - usersdb:/config 
    restart: "no"
  authelia:
    image: authelia/authelia:4.39
    container_name: authelia
    volumes:
      - ./authelia:/config
    environment:
      - TZ=America/Sao_Paulo
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile 
    container_name: nginx
    ports:
      - 9091:443
    restart: unless-stopped
    networks: [default, rede-supabase]
    env_file:
      - .env
    volumes:
      - ./nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./authelia:/config
      - ./snippets:/app/snippets
  studio:
    container_name: supabase-studio
    image: supabase/studio:2026.06.29-sha-20290c7
    restart: unless-stopped
    env_file:
      - .analytics.env
    networks: [default, rede-supabase]
    environment:
      STUDIO_PG_META_URL: https://nginx:443/api/platform/pg-meta
      DEFAULT_ORGANIZATION_NAME: postgres
      DEFAULT_PROJECT_NAME: postgres
      SUPABASE_PUBLIC_URL: https://<SEU_IP>:9091
      LOGFLARE_URL: https://nginx:443/_internal/logflare
      NEXT_PUBLIC_ENABLE_LOGS: "true"
      ENABLED_FEATURES_LOGS_ALL: "true"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
      SNIPPETS_MANAGEMENT_FOLDER: /app/snippets
    volumes:
      - ./snippets:/app/snippets
  # postgres:
