#docker compose up --build -d
x-vector-logging: &vector-logging
  driver: fluentd
  options:
    fluentd-address: ${VECTOR_FLUENTD_ADDRESS:-127.0.0.1:24224}
    fluentd-async: "true"
    fluentd-sub-second-precision: "true"

secrets:
  JWT_SECRET:
    file: ./secrets/authelia/JWT_SECRET
  SESSION_SECRET:
    file: ./secrets/authelia/SESSION_SECRET
  STORAGE_ENCRYPTION_KEY:
    file: ./secrets/authelia/STORAGE_ENCRYPTION_KEY

services:
  usersdb-init:
    image: ${USERSDB_INIT_IMAGE}
    command: >
        sh -c "cp -R /seed/* /config &&
              chown -R 65534:65534 /config &&
              echo 'usersdb preparado'"
    volumes:
      - ./authelia:/seed:ro 
      - usersdb:/config 
    restart: "no"
    logging: *vector-logging
  authelia:
    image: ${AUTHELIA_IMAGE}
    container_name: authelia
    command:
      - authelia
      - --config=/config/configuration.runtime.yml
    volumes:
      - ./authelia:/config
    environment:
      - TZ=${TZ}
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE=/run/secrets/JWT_SECRET
      - AUTHELIA_SESSION_SECRET_FILE=/run/secrets/SESSION_SECRET
      - AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE=/run/secrets/STORAGE_ENCRYPTION_KEY
    secrets:
      - JWT_SECRET
      - SESSION_SECRET
      - STORAGE_ENCRYPTION_KEY
    restart: unless-stopped
    logging: *vector-logging

  nginx:
    build:
      context: .
      dockerfile: Dockerfile 
      args:
        AUTHELIA_IMAGE: ${AUTHELIA_IMAGE}
    container_name: nginx
    ports:
      - "${STUDIO_HTTPS_PORT}:443"
    restart: unless-stopped
    logging: *vector-logging
    depends_on:
      studio:
        condition: service_started
    networks: [default, rede-supabase]
    env_file:
      - .env
    environment:
      SNIPPETS_MANAGEMENT_FOLDER: ${SNIPPETS_MANAGEMENT_FOLDER}
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE: /var/run/authelia-cli-secrets/JWT_SECRET
      AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE: /var/run/authelia-cli-secrets/STORAGE_ENCRYPTION_KEY
    secrets:
      - JWT_SECRET
      - STORAGE_ENCRYPTION_KEY
    volumes:
      - ./nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./authelia:/config
      - ./snippets:/app/snippets
  studio:
    container_name: supabase-studio
    build:
      context: ./studio-slug
      dockerfile: Dockerfile
      args:
        SUPABASE_STUDIO_COMMIT: ${SUPABASE_STUDIO_COMMIT:-20290c71bdc48bef1720bfe7d292f3b9e6154f7d}
        SUPABASE_STUDIO_REPOSITORY: ${SUPABASE_STUDIO_REPOSITORY:-https://github.com/supabase/supabase.git}
    image: ${STUDIO_SLUG_IMAGE:-ghcr.io/gustavomartins123/multitenant-studio:20290c7-context-v1}
    restart: unless-stopped
    logging: *vector-logging
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/api/platform/profile').then((r) => {if (r.status !== 200) throw new Error(r.status)})\""
        ]
      timeout: 10s
      interval: 5s
      retries: 3
      start_period: 20s
    env_file:
      - .analytics.env
    networks: [default, rede-supabase]
    environment:
      HOSTNAME: "0.0.0.0"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      STUDIO_PG_META_URL: https://nginx:443/api/platform/pg-meta
      DEFAULT_ORGANIZATION_NAME: ${DEFAULT_ORGANIZATION_NAME}
      DEFAULT_PROJECT_NAME: postgres
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      LOGFLARE_URL: https://nginx:443/_internal/logflare
      NEXT_PUBLIC_ENABLE_LOGS: "true"
      ENABLED_FEATURES_LOGS_ALL: "true"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
      SNIPPETS_MANAGEMENT_FOLDER: ${SNIPPETS_MANAGEMENT_FOLDER}
    volumes:
      - ./snippets:/app/snippets
