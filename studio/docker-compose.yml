#docker compose up --build -d
services:
  usersdb-init:
    image: ${USERSDB_INIT_IMAGE}
    command: >
        sh -c "cp -R /seed/* /config &&
              chown -R 65534:65534 /config &&
              echo 'usersdb preparado'"
    volumes:
      - ./authelia:/seed:ro 
      - usersdb:/config 
    restart: "no"
  authelia:
    image: ${AUTHELIA_IMAGE}
    container_name: ${AUTHELIA_CONTAINER_NAME}
    volumes:
      - ./authelia:/config
    environment:
      - TZ=${TZ}
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile 
    container_name: ${NGINX_CONTAINER_NAME}
    ports:
      - "${STUDIO_HTTPS_PORT}:443"
    restart: unless-stopped
    networks: [default, rede-supabase]
    env_file:
      - .env
    environment:
      SNIPPETS_MANAGEMENT_FOLDER: ${SNIPPETS_MANAGEMENT_FOLDER}
    volumes:
      - ./nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./authelia:/config
      - ./snippets:/app/snippets
  studio:
    container_name: ${STUDIO_CONTAINER_NAME}
    image: ${STUDIO_IMAGE}
    restart: unless-stopped
    env_file:
      - .analytics.env
    networks: [default, rede-supabase]
    environment:
      STUDIO_PG_META_URL: ${STUDIO_PG_META_URL}
      DEFAULT_ORGANIZATION_NAME: ${DEFAULT_ORGANIZATION_NAME}
      DEFAULT_PROJECT_NAME: ${DEFAULT_PROJECT_NAME}
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      LOGFLARE_URL: ${LOGFLARE_URL}
      NEXT_PUBLIC_ENABLE_LOGS: ${NEXT_PUBLIC_ENABLE_LOGS}
      ENABLED_FEATURES_LOGS_ALL: ${ENABLED_FEATURES_LOGS_ALL}
      NEXT_ANALYTICS_BACKEND_PROVIDER: ${NEXT_ANALYTICS_BACKEND_PROVIDER}
      SNIPPETS_MANAGEMENT_FOLDER: ${SNIPPETS_MANAGEMENT_FOLDER}
    volumes:
      - ./snippets:/app/snippets
