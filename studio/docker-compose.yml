#docker compose up --build -d
services:
  usersdb-init:
    image: ${USERSDB_INIT_IMAGE}
    command: >
        sh -c "cp -R /seed/* /config &&
              chown -R 65534:65534 /config &&
              echo 'usersdb preparado'"
    volumes:
      - ./authelia:/seed:ro 
      - usersdb:/config 
    restart: "no"
  authelia:
    image: ${AUTHELIA_IMAGE}
    container_name: authelia
    volumes:
      - ./authelia:/config
    environment:
      - TZ=${TZ}
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile 
      args:
        AUTHELIA_IMAGE: ${AUTHELIA_IMAGE}
    container_name: nginx
    ports:
      - "${STUDIO_HTTPS_PORT}:443"
    restart: unless-stopped
    networks: [default, rede-supabase]
    env_file:
      - .env
    environment:
      SNIPPETS_MANAGEMENT_FOLDER: ${SNIPPETS_MANAGEMENT_FOLDER}
    volumes:
      - ./nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./authelia:/config
      - ./snippets:/app/snippets
  studio:
    container_name: supabase-studio
    image: ${STUDIO_IMAGE}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/api/platform/profile').then((r) => {if (r.status !== 200) throw new Error(r.status)})\""
        ]
      timeout: 10s
      interval: 5s
      retries: 3
      start_period: 20s
    env_file:
      - .analytics.env
    networks: [default, rede-supabase]
    environment:
      # O servidor standalone do Studio precisa escutar também na interface Docker.
      HOSTNAME: "0.0.0.0"
      STUDIO_PG_META_URL: https://nginx:443/api/platform/pg-meta
      DEFAULT_ORGANIZATION_NAME: ${DEFAULT_ORGANIZATION_NAME}
      DEFAULT_PROJECT_NAME: postgres
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      LOGFLARE_URL: https://nginx:443/_internal/logflare
      NEXT_PUBLIC_ENABLE_LOGS: "true"
      ENABLED_FEATURES_LOGS_ALL: "true"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
      SNIPPETS_MANAGEMENT_FOLDER: ${SNIPPETS_MANAGEMENT_FOLDER}
    volumes:
      - ./snippets:/app/snippets
