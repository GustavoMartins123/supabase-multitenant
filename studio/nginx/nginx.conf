env FERNET_SECRET;
env NGINX_SHARED_TOKEN;
env PUSH_WORKER_TOKEN;
env COOKIE_SIGN_SECRET;
env SERVER_DOMAIN;
env BACKEND_PROTO;

env OPENAI_API_KEY;
env OPENAI_API_BASE_URL;
env OPENAI_MODEL;
env POSTGRES_DB;
env POSTGRES_USER;
env POSTGRES_NGINX_PASSWORD;
env DATABASE_URL;

worker_processes auto;
events {
    worker_connections 2048;
}
http{
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    lua_package_path "/usr/local/share/lua/5.1/?.lua;/usr/local/share/lua/5.1/?/init.lua;;";


    resolver 127.0.0.11 ipv6=off valid=30s;
    map_hash_bucket_size 256;
                       
    lua_shared_dict service_keys  10m;
    lua_shared_dict users_cache 5m;

    map "" $authelia_upstream { default "authelia:9091"; }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $scheme $hsts_header {
    https   "max-age=63072000; preload";
    }

    init_worker_by_lua_file /usr/local/openresty/lualib/init/init_worker.lua;


    init_by_lua_file /usr/local/openresty/lualib/init/init.lua;
    
    server {
        listen 443 ssl;
        server_name pass;

        ssl_certificate /config/ssl/ca.pem;
        ssl_certificate_key /config/ssl/ca.key;

        auth_request /authelia;
        auth_request_set $target_url $scheme://$http_host$request_uri;
        error_page 401 =302 https://$host:9091/?rd=$target_url;

        access_log /var/log/studio_access.log;
        error_log /var/log/studio_error.log debug;
        root /usr/share/nginx/html;
        index index.html;
 
        set_by_lua_file $server_domain /usr/local/openresty/lualib/utils/server_domain.lua;
        set_by_lua_file $server_hostname /usr/local/openresty/lualib/utils/server_hostname.lua;

        set_by_lua_file $upstream_scheme /usr/local/openresty/lualib/utils/upstream_scheme.lua;
        
        set_by_lua_file $nginx_shared_token /usr/local/openresty/lualib/utils/nginx_shared_token.lua;

        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;

        location = /api/config {
            default_type application/json;
            content_by_lua_file /usr/local/openresty/lualib/api_config.lua;
        }

        location = /logout {
            auth_request off;
            return 302 https://$host:9091/logout?rd=$scheme://$http_host/;
        }

        location = /set-project {
            content_by_lua_file /usr/local/openresty/lualib/api_set_project.lua;
        }

        set_by_lua_file $project_ref /usr/local/openresty/lualib/utils/project_ref.lua;


        set_by_lua_file $server_path /usr/local/openresty/lualib/utils/server_path.lua;
        ## Flutter Web
        location / {
            try_files $uri $uri/ /index.html; 
        }
        location /authelia {
            internal;
            proxy_pass https://$authelia_upstream/api/verify;
            proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Method $request_method;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Content-Length "";
            proxy_pass_request_body off;
            proxy_ssl_server_name on;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate /config/ssl/ca.pem;
        }

        location ^~ /_next/          { 
            auth_request off; 
            proxy_pass http://studio:3000; 
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
        location ^~ /monaco-editor/  { 
            proxy_pass http://studio:3000;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
        location ^~ /favicon/        { 
            auth_request off;
            proxy_pass http://studio:3000;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=604800, immutable" always;
        }
        location ^~ /img/            {
            auth_request off;
            proxy_pass http://studio:3000;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=604800, immutable" always;
        }

        location ~ ^/api/platform/projects/[^/]+/run-lints$ {
            default_type application/json;
            add_header   Cache-Control "no-store";
            return 200 '[]';
        }

        location ~ ^/api/platform/projects/default/api/rest(.*)$ {
            set $target_rest_path "";
            
            access_by_lua_file /usr/local/openresty/lualib/auth/inject_service_key.lua;
            rewrite_by_lua_file /usr/local/openresty/lualib/api/rewrite_rest_v1.lua;
            
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header X-Forwarded-For    $remote_addr;
            proxy_http_version 1.1;

            proxy_pass $server_path$target_rest_path$is_args$args;             
        }

        location = /api/v1/projects/default/functions {
            content_by_lua_file /usr/local/openresty/lualib/api/return_empty_json.lua;
        }

        location ~ ^/api/v1/projects/ {
            proxy_pass http://studio:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~* ^/api/platform/projects/ {
            proxy_pass http://studio:3000;
            proxy_redirect off;
        }

        location ^~ /project/ {
            proxy_pass http://studio:3000;
        }
        location ~ ^/_internal_api/projects/(?<slug>[^/]+)/members$ {
            internal;
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_set_header      Remote-Email $http_remote_email;
            proxy_set_header      Remote-Groups $http_remote_groups;
            proxy_pass $server_domain/api/projects/$slug/members;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location ~ ^/_internal_api/projects/(?<slug>[^/]+)/rotate-key$ {
            internal;
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_set_header      Remote-Email $http_remote_email;
            proxy_set_header      Remote-Groups $http_remote_groups;
            proxy_pass $server_domain/api/projects/$slug/rotate-key;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location ~ ^/api/projects/(?<slug>[^/]+)/members/(?<member_id>[^/]+)$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;

            access_by_lua_file /usr/local/openresty/lualib/auth/check_email_hash.lua;
            if ($request_method != DELETE) {
                return 405;
            }
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_pass $server_domain/api/projects/$slug/members/$member_id;
        }
        
        location = /api/projects/duplicate {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;
            
            access_by_lua_file /usr/local/openresty/lualib/auth/check_email_hash.lua;
            

            if ($request_method != "POST") {
                return 405;
            }
            
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_pass $server_domain/api/projects/duplicate;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        }
        
        
        location ~ ^/api/projects/(?<slug>[^/]+)/members$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups $upstream_http_remote_groups;
            access_by_lua_file /usr/local/openresty/lualib/auth/check_email_hash.lua;

            if ($request_method = "GET"){
                content_by_lua_file /usr/local/openresty/lualib/api/project_members.lua;
            }
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            if ($request_method = "POST") {
                proxy_pass $server_domain/api/projects/$slug/members;
            }
        }
        location ~ ^/api/projects/(?<slug>[^/]+)/available-users$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups $upstream_http_remote_groups;

            access_by_lua_file /usr/local/openresty/lualib/auth/check_email_hash.lua;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                return 204;
            }

            content_by_lua_file /usr/local/openresty/lualib/api/available_users.lua;
        }
        location ~ ^/api/projects/(?<slug>[^/]+)/status$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;

            access_by_lua_file /usr/local/openresty/lualib/auth/check_email_hash.lua;

            if ($request_method != "GET") { return 405; }
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_pass $server_domain/api/projects/$slug/status;
        }
        location ~ ^/api/projects/(?<slug>[^/]+)/logs/(?<service>[^/]+)$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;

            access_by_lua_file /usr/local/openresty/lualib/auth/check_email_hash.lua;
            if ($request_method != "GET") { return 405; }
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_pass $server_domain/api/projects/$slug/logs/$service$is_args$args;
        }
        location ~ ^/api/projects/(?<slug>[^/]+)/rotate-key$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;

            access_by_lua_file /usr/local/openresty/lualib/auth/check_email_hash.lua;

            if ($request_method != "POST") { return 405; }

            content_by_lua_file /usr/local/openresty/lualib/api/project_rotate_key.lua;
        }

        location ~ ^/api/projects/(?<slug>[^/]+)/start$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;

            access_by_lua_file /usr/local/openresty/lualib/auth/check_email_hash.lua;

            if ($request_method != "POST") { return 405; }
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_pass $server_domain/api/projects/$slug/start;
        }

        location ~ ^/api/projects/(?<slug>[^/]+)/stop$ {       
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;

            access_by_lua_file /usr/local/openresty/lualib/auth/check_email_hash.lua;

            if ($request_method != "POST") { return 405; }
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_pass $server_domain/api/projects/$slug/stop;
        }

        location ~ ^/api/projects/(?<slug>[^/]+)/restart$ { 
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;

            access_by_lua_file /usr/local/openresty/lualib/auth/check_email_hash.lua;

            if ($request_method != "POST") { return 405; }
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_pass $server_domain/api/projects/$slug/restart;
        }


        location ~ ^/api/projects(/.*)?$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups $upstream_http_remote_groups;
            access_by_lua_file /usr/local/openresty/lualib/auth/check_email_hash.lua;

            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_pass $server_domain/api/projects$1;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme; 
        }
        
        location = /api/platform/profile{
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass http://studio:3000;

            
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }



        location = /project/default {
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass http://studio:3000;

            
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }
                     
        location ~ ^/api/platform/pg-meta/([^/]+)(/.*)?$ {
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  '*'        always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                return 204;
            }
            set $resource $2;                 # /tables  | /columns/1 …
            set_by_lua_file $project_ref /usr/local/openresty/lualib/utils/project_ref.lua;
            access_by_lua_file /usr/local/openresty/lualib/auth/inject_service_key_apikey.lua;
            rewrite_by_lua_file /usr/local/openresty/lualib/api/rewrite_pg_meta.lua;
            proxy_pass "${server_path}meta${resource}${is_args}${args}";
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        
        location /api/platform/auth {
            access_by_lua_file /usr/local/openresty/lualib/api/auth_routing.lua;
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass $server_path$uri$is_args$args;

            
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }
        

        location /api/platform/storage {
            client_max_body_size 500M;
            access_by_lua_file /usr/local/openresty/lualib/auth/inject_service_key_storage.lua;
            
            rewrite ^/api/platform/storage/default/buckets$ /storage/v1/bucket break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9]+)$ /storage/v1/bucket/$1 break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9]+)/empty$ /storage/v1/bucket/$1/empty break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9_-]+)/objects/sign$  /storage/v1/object/sign/$1  break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9]+)/objects/list$ /storage/v1/object/list/$1 break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9_-]+)/objects/move$ /storage/v1/object/move/$1 break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9_-]+)/objects/download$ /storage/v1/object/$1 break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9_-]+)/objects$ /storage/v1/object/$1 break;
            
            rewrite_by_lua_file /usr/local/openresty/lualib/api/rewrite_storage.lua;
            header_filter_by_lua_file /usr/local/openresty/lualib/api/header_filter_storage.lua;
            body_filter_by_lua_file /usr/local/openresty/lualib/api/body_filter_storage.lua;
            
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;
            
            proxy_pass $server_path$uri$is_args$args;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }

        location /object/sign {
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;
            
            rewrite ^/object/sign$ /storage/v1/$1 break;
            proxy_pass $server_path$uri$is_args$args;

            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }

        location /storage/v1 {
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  '*'        always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, tus-resumable, upload-length, upload-metadata, x-source' always;
                return 204;
            }
            
            access_by_lua_file /usr/local/openresty/lualib/auth/inject_service_key.lua;
            rewrite ^/storage/v1/(.*)$ /storage/v1/$1 break;
            
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass $server_path$uri$is_args$args;

            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;

            add_header 'Access-Control-Allow-Origin'   '*' always;
            add_header 'Access-Control-Allow-Methods'  'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'  'Authorization, Content-Type, tus-resumable, upload-length, upload-metadata, x-source' always;
        }

        location /api/user/me {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;
            
            set $myrole "";
            set $username "";
            set $display_name "";
            set $user_hash "";
            
            access_by_lua_file /usr/local/openresty/lualib/auth/user_me.lua;
            
            content_by_lua_file /usr/local/openresty/lualib/api/user_me_content.lua;
        }

        
        location ~ ^/api/admin/users/signup/?$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;
            
            access_by_lua_file /usr/local/openresty/lualib/auth/check_admin.lua;

            rewrite_by_lua_file /usr/local/openresty/lualib/api/admin_user_signup.lua;
        }

        location /api/admin/users {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;
            
            access_by_lua_file /usr/local/openresty/lualib/auth/check_admin.lua;
            
            rewrite_by_lua_file /usr/local/openresty/lualib/api/admin_users_method.lua;
            
            content_by_lua_file /usr/local/openresty/lualib/api/admin_users_list.lua;
        }

        location ~ ^/api/admin/users/([^/]+)/deactivate/?$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;
            
            access_by_lua_file /usr/local/openresty/lualib/auth/check_admin.lua;

            rewrite_by_lua_file /usr/local/openresty/lualib/api/admin_user_deactivate_check.lua;
                
            content_by_lua_file /usr/local/openresty/lualib/api/admin_user_deactivate.lua;
        }

        location ~ ^/api/admin/users/([^/]+)/activate/?$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;
            
            access_by_lua_file /usr/local/openresty/lualib/auth/check_admin.lua;

            rewrite_by_lua_file /usr/local/openresty/lualib/api/admin_user_activate_check.lua;
                
            content_by_lua_file /usr/local/openresty/lualib/api/admin_user_activate.lua;
        }

        location = /api/admin/projects-info {
            auth_request_set $authelia_email $upstream_http_remote_email;
            auth_request_set $authelia_groups $upstream_http_remote_groups;
            access_by_lua_file /usr/local/openresty/lualib/auth/check_admin.lua;

            rewrite_by_lua_file /usr/local/openresty/lualib/api/admin_projects_info_method.lua;

            set_by_lua_file $email_hash /usr/local/openresty/lualib/utils/email_hash.lua;

            proxy_pass $server_domain/api/projects/admin/projects-info;
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Remote-Email $email_hash;
            proxy_set_header Remote-Groups $authelia_groups;
        }

        
        location ~ ^/api/admin/projects/([^/]+)/?$ {
            auth_request_set $authelia_email $upstream_http_remote_email;
            auth_request_set $authelia_groups $upstream_http_remote_groups;
            
            access_by_lua_file /usr/local/openresty/lualib/auth/check_admin.lua;
            
            rewrite_by_lua_file /usr/local/openresty/lualib/api/admin_projects_delete_check.lua;
            
            set_by_lua_file $email_hash /usr/local/openresty/lualib/utils/email_hash.lua;

            proxy_pass $server_domain/api/projects/$1;
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Remote-Email $email_hash;
            proxy_set_header Remote-Groups $authelia_groups;
        }

        location ~ ^/api/admin/projects/(?<slug>[^/]+)/all-users$ {
            auth_request_set $authelia_email $upstream_http_remote_email;
            auth_request_set $authelia_groups $upstream_http_remote_groups;
            
            access_by_lua_file /usr/local/openresty/lualib/auth/check_admin_with_email.lua;
            
            content_by_lua_file /usr/local/openresty/lualib/api/admin_all_users.lua;
        }

        location = /api/internal/push {
            auth_request off;
            access_by_lua_file /usr/local/openresty/lualib/auth/check_push_worker.lua;
            content_by_lua_file /usr/local/openresty/lualib/send_push.lua;
        }


        location ~ ^/api/admin/projects/([^/]+)/transfer/?$ {
            auth_request_set $authelia_email  $upstream_http_remote_email;
            auth_request_set $authelia_groups $upstream_http_remote_groups;

            access_by_lua_file /usr/local/openresty/lualib/auth/check_admin.lua;

            rewrite_by_lua_file /usr/local/openresty/lualib/api/admin_projects_transfer_check.lua;

            set_by_lua_file $email_hash /usr/local/openresty/lualib/utils/email_hash.lua;

            proxy_pass          $server_domain/api/projects/$1/transfer;
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_set_header    X-Real-IP           $remote_addr;
            proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto   $scheme;
            proxy_set_header    Remote-Email        $email_hash;
            proxy_set_header    Remote-Groups       $authelia_groups;
        }

        location ~ ^/api/ai/sql/generate-v[0-9]+$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;
            
            chunked_transfer_encoding on;
            proxy_buffering off;
            proxy_read_timeout 300s;
            client_body_buffer_size 128k;
            client_max_body_size 10m;
            client_body_timeout 60s;
            
            access_by_lua_file /usr/local/openresty/lualib/auth/check_ai_auth.lua;
            content_by_lua_file /usr/local/openresty/lualib/api/ai_sql_generate_handler.lua;
        }

        location ~ ^/api/ai/code/complete$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;
            
            client_body_buffer_size 128k;
            client_max_body_size 10m;
            client_body_timeout 60s;
            
            access_by_lua_file /usr/local/openresty/lualib/auth/check_ai_auth.lua;
            content_by_lua_file /usr/local/openresty/lualib/api/ai_code_complete_handler.lua;
        }

        location ~ ^/api/ai/sql/check-api-key$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;
            
            access_by_lua_file /usr/local/openresty/lualib/auth/check_authenticated.lua;
            content_by_lua_file /usr/local/openresty/lualib/api/mock_check_api_key.lua;
        }

        location ~ ^/api/platform/organizations/([a-zA-Z0-9_-]+)/billing/subscription$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;
            
            access_by_lua_file /usr/local/openresty/lualib/auth/check_authenticated.lua;
            rewrite_by_lua_file /usr/local/openresty/lualib/api/check_get_method.lua;
            content_by_lua_file /usr/local/openresty/lualib/api/mock_subscription.lua;
        }

        location ~ ^/api/platform/organizations(?:/[a-zA-Z0-9_-]+)?$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;
            
            access_by_lua_file /usr/local/openresty/lualib/auth/check_authenticated.lua;
            content_by_lua_file /usr/local/openresty/lualib/api/mock_organizations.lua;
        }
    }
}
