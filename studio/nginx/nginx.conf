env STUDIO_SERVICE_KEY_ENCRYPTION_KEY;
env NGINX_SHARED_TOKEN;
env NGINX_HMAC_SECRET;
env NGINX_HMAC_TOKEN_TTL;
env INTERNAL_HMAC_SECRET;
env INTERNAL_HMAC_MAX_SKEW_SECONDS;
env SERVER_DOMAIN;
env BACKEND_PROTO;
env SERVICE_KEY_CACHE_TTL_SECONDS;
env SERVICE_KEY_VERSION_CHECK_TTL_SECONDS;
env SERVICE_KEY_FETCH_ERROR_TTL_SECONDS;
env SERVICE_KEY_VERIFY_TLS;
env ADMIN_GROUPS;
env STUDIO_CONTEXT_CACHE_TTL_SECONDS;
env AVATAR_PROCESS_MAX_CONCURRENCY;
env AVATAR_PROCESS_TIMEOUT_MS;
env AVATAR_MAX_PIXELS;
env AVATAR_MAX_SOURCE_EDGE;
env AVATAR_MAX_EDGE;
env VIPS_CONCURRENCY;
env AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE;
env AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE;

env OPENAI_API_KEY;
env OPENAI_API_BASE_URL;
env OPENAI_MODEL;
env POSTGRES_DB;
env POSTGRES_USER;
env POSTGRES_NGINX_PASSWORD;
env DATABASE_URL;

worker_processes auto;
worker_rlimit_nofile 32768;
events {
    worker_connections 4096;
}

stream {
    map $ssl_preread_protocol $studio_entrypoint_upstream {
        ""      127.0.0.1:8080;
        default 127.0.0.1:8443;
    }

    server {
        listen 443;
        proxy_pass $studio_entrypoint_upstream;
        proxy_protocol on;
        ssl_preread on;
    }
}

http{
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;
    set_real_ip_from 127.0.0.1;
    real_ip_header proxy_protocol;

    lua_package_path "/usr/local/openresty/lualib/?.lua;/usr/local/openresty/lualib/?/init.lua;/usr/local/share/lua/5.1/?.lua;/usr/local/share/lua/5.1/?/init.lua;;";
    lua_ssl_trusted_certificate /var/run/studio-ca-bundle.pem;
    lua_ssl_verify_depth 2;


    resolver 127.0.0.11 ipv6=off valid=30s;
    map_hash_bucket_size 256;
                       
    lua_shared_dict service_keys  10m;
    lua_shared_dict service_key_metrics 1m;
    lua_shared_dict users_cache 5m;
    lua_shared_dict internal_hmac_nonces 1m;
    lua_shared_dict avatar_processing 1m;

    map "" $authelia_upstream { default "authelia:9091"; }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $scheme $hsts_header {
    https   "max-age=63072000; preload";
    }

    init_worker_by_lua_file /usr/local/openresty/lualib/init/init_worker.lua;


    init_by_lua_file /usr/local/openresty/lualib/init/init.lua;

    server {
        listen 8080 proxy_protocol;
        server_name _;

        access_log /var/log/studio_access.log;
        error_log /var/log/studio_error.log warn;

        return 301 https://$http_host$request_uri;
    }
    
    server {
        listen 8443 ssl proxy_protocol;
        server_name _;
        client_max_body_size 0;
        set $auth_user_id "";
        set $auth_user_token "";
        set $bootstrap_admin "";
        set_by_lua_file $clear_project_cookie /usr/local/openresty/lualib/project_context/cookie_cleanup.lua;
        set $studio_public_origin "$scheme://$http_host";
        set_by_lua_block $root_url_escaped {
            return ngx.escape_uri((ngx.var.studio_public_origin or "") .. "/")
        }

        ssl_certificate /config/ssl/ca.pem;
        ssl_certificate_key /config/ssl/ca.key;

        server_rewrite_by_lua_file /usr/local/openresty/lualib/security/upload_route_guard.lua;

        auth_request /authelia;
        auth_request_set $authelia_email  $upstream_http_remote_email;
        auth_request_set $authelia_groups $upstream_http_remote_groups;
        error_page 401 = @authentication_required;

        access_log /var/log/studio_access.log;
        error_log /var/log/studio_error.log debug;
        root /usr/share/nginx/html;
        index index.html;
 
        set_by_lua_file $server_domain /usr/local/openresty/lualib/project_context/server_domain.lua;
        set_by_lua_file $server_hostname /usr/local/openresty/lualib/utils/server_hostname.lua;

        set_by_lua_file $upstream_scheme /usr/local/openresty/lualib/utils/upstream_scheme.lua;
        
        set_by_lua_file $nginx_shared_token /usr/local/openresty/lualib/security/nginx_shared_token.lua;

        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        header_filter_by_lua_block {
            local clear_cookie = ngx.var.clear_project_cookie
            local cookies_to_clear = {}
            if clear_cookie and clear_cookie ~= "" then
                table.insert(cookies_to_clear, clear_cookie)
            end
            if ngx.var.cookie_supabase_storage_limit then
                table.insert(
                    cookies_to_clear,
                    "supabase_storage_limit=; Path=/; HttpOnly; Secure; SameSite=Lax; Max-Age=0; Expires=Thu, 01 Jan 1970 00:00:00 GMT"
                )
            end
            if ngx.var.cookie_ai_chat_session then
                table.insert(
                    cookies_to_clear,
                    "ai_chat_session=; Path=/; HttpOnly; Secure; SameSite=Lax; Max-Age=0; Expires=Thu, 01 Jan 1970 00:00:00 GMT"
                )
            end

            if #cookies_to_clear > 0 then
                local set_cookie = ngx.header["Set-Cookie"]
                if set_cookie and type(set_cookie) ~= "table" then
                    set_cookie = { set_cookie }
                elseif not set_cookie then
                    set_cookie = {}
                end
                for _, cookie in ipairs(cookies_to_clear) do
                    table.insert(set_cookie, cookie)
                end
                ngx.header["Set-Cookie"] = set_cookie
            end
        }

        location = /api/config {
            default_type application/json;
            content_by_lua_file /usr/local/openresty/lualib/studio_compat/api_config.lua;
        }

        location = /api/mcp {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/studio_compat/mcp_disabled.lua;
        }

        location ~ "^/internal/cache/service-key/(?<cache_ref>[a-z_][a-z0-9_]{2,39})$" {
            auth_request off;
            content_by_lua_file /usr/local/openresty/lualib/cache/invalidate_service_key.lua;
        }

        location = /internal/cache/service-key-metrics {
            auth_request off;
            content_by_lua_file /usr/local/openresty/lualib/cache/service_key_metrics.lua;
        }

        location = /internal/snippets/rename {
            auth_request off;
            content_by_lua_file /usr/local/openresty/lualib/admin_api/snippets_rename.lua;
        }

        location = /logout {
            auth_request off;
            return 302 $studio_public_origin/auth/logout?rd=$root_url_escaped;
        }

        location = /login {
            auth_request off;
            return 302 $studio_public_origin/auth?rd=$root_url_escaped;
        }

        location @authentication_required {
            auth_request off;
            content_by_lua_file /usr/local/openresty/lualib/security/authentication_required.lua;
        }

        location = /auth {
            auth_request off;
            proxy_pass https://$authelia_upstream$request_uri;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-URI $request_uri;
            proxy_set_header X-Forwarded-Method $request_method;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_ssl_server_name on;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate /config/ssl/ca.pem;
        }

        location /auth/ {
            auth_request off;
            proxy_pass https://$authelia_upstream$request_uri;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-URI $request_uri;
            proxy_set_header X-Forwarded-Method $request_method;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_ssl_server_name on;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate /config/ssl/ca.pem;
        }

        set $project_ref "";
        set $server_path "";
        ## Flutter Web
        location / {
            auth_request off;
            try_files $uri $uri/ /index.html; 
        }
        location /authelia {
            internal;
            proxy_pass https://$authelia_upstream/api/verify;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-URI $request_uri;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Method $request_method;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Content-Length "";
            proxy_pass_request_body off;
            proxy_ssl_server_name on;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate /config/ssl/ca.pem;
        }

        location ^~ /_next/          { 
            auth_request off; 
            proxy_pass http://studio:3000; 
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
        location ^~ /monaco-editor/  { 
            proxy_pass http://studio:3000;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
        location ^~ /favicon/        { 
            auth_request off;
            proxy_pass http://studio:3000;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=604800, immutable" always;
        }
        location ^~ /img/            {
            auth_request off;
            proxy_pass http://studio:3000;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=604800, immutable" always;
        }

        location ~ "^/api/platform/projects/[a-z_][a-z0-9_]{2,39}/run-lints$" {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/api/return_empty_json.lua;
        }

        location = /api/platform/projects {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/studio_compat/project_context_response.lua;
        }

        location = /api/platform/projects/ {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/studio_compat/project_context_response.lua;
        }

        location ~ "^/api/platform/props/project/[a-z_][a-z0-9_]{2,39}/api/?$" {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/studio_compat/project_context_response.lua;
        }

        location ~ "^/api/platform/props/project/[a-z_][a-z0-9_]{2,39}/?$" {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/studio_compat/project_context_response.lua;
        }

        location ~ "^/api/platform/projects/[a-z_][a-z0-9_]{2,39}/settings/?$" {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/studio_compat/project_context_response.lua;
        }

        location ~ "^/api/platform/projects/[a-z_][a-z0-9_]{2,39}/databases/?$" {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/studio_compat/project_context_response.lua;
        }

        location ~ "^/api/platform/projects/[a-z_][a-z0-9_]{2,39}/api-keys/temporary/?$" {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/studio_compat/project_context_response.lua;
        }

        location ~ "^/api/platform/projects/[a-z_][a-z0-9_]{2,39}/?$" {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/studio_compat/project_context_response.lua;
        }

        location ~ "^/api/v1/projects/[a-z_][a-z0-9_]{2,39}/api-keys(?:/.*)?$" {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/studio_compat/project_context_response.lua;
        }

        location ~ "^/api/platform/projects/[a-z_][a-z0-9_]{2,39}/content/?$" {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/studio_compat/content_user_root.lua;
        }

        location ~ "^/api/platform/projects/[a-z_][a-z0-9_]{2,39}/content/folders/?$" {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/studio_compat/content_user_folders.lua;
        }

        location ~ "^/api/platform/projects/[a-z_][a-z0-9_]{2,39}/content/folders/[^/]+$" {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/studio_compat/content_user_folder_item.lua;
        }

        location ~ "^/api/platform/projects/[a-z_][a-z0-9_]{2,39}/content/count/?$" {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/studio_compat/content_user_count.lua;
        }

        location ~ "^/api/platform/projects/[a-z_][a-z0-9_]{2,39}/content/item/[^/]+$" {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/studio_compat/content_user_item.lua;
        }

        location ~ "^/api/platform/projects/[a-z_][a-z0-9_]{2,39}/api/rest(.*)$" {
            set $target_rest_path "";
            
            access_by_lua_file /usr/local/openresty/lualib/security/inject_service_key.lua;
            rewrite_by_lua_file /usr/local/openresty/lualib/proxy_rewrites/rest_v1.lua;
            
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header X-Forwarded-For    $remote_addr;
            proxy_http_version 1.1;

            proxy_pass $server_path$target_rest_path$is_args$args;             
        }

        location ~ "^/api/platform/projects/[a-z_][a-z0-9_]{2,39}/api/graphql/?$" {
            access_by_lua_file /usr/local/openresty/lualib/security/inject_service_key_graphql.lua;
            rewrite_by_lua_file /usr/local/openresty/lualib/proxy_rewrites/graphql.lua;

            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;
            proxy_set_header      Host $server_hostname;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header X-Forwarded-For    $remote_addr;
            proxy_http_version 1.1;
            proxy_pass $server_path$uri$is_args$args;
        }

        location ~ "^/api/platform/projects/[a-z_][a-z0-9_]{2,39}/config(?:/postgrest)?/?$" {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/studio_compat/project_context_response.lua;
        }

        location ~ "^/api/v1/projects/[a-z_][a-z0-9_]{2,39}/functions/?$" {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            content_by_lua_file /usr/local/openresty/lualib/api/return_empty_json.lua;
        }

        location ~ ^/api/v1/projects/ {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            proxy_pass http://studio:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~* ^/api/platform/projects/[^/]+/analytics(?:/|$) {
            auth_request_set $authelia_groups $upstream_http_remote_groups;
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_admin_access.lua;
            rewrite_by_lua_file /usr/local/openresty/lualib/proxy_rewrites/analytics.lua;
            proxy_pass http://studio:3000;
            proxy_redirect off;
        }

        location ~ ^/_internal/logflare/(?<logflare_path>.*)$ {
            auth_request off;
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_set_header      X-API-KEY $http_x_api_key;
            proxy_set_header      Authorization $http_authorization;
            proxy_pass $server_domain/api/internal/analytics/$logflare_path$is_args$args;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~* ^/api/platform/projects/ {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            proxy_pass http://studio:3000;
            proxy_redirect off;
        }

        location ~ "^/project/[a-z_][a-z0-9_]{2,39}(?:/.*)?$" {
            access_by_lua_file /usr/local/openresty/lualib/security/studio_project_access.lua;
            proxy_pass http://studio:3000;
        }

        location /project/ {
            default_type application/json;
            return 400 '{"error":"invalid_path_ref","message":"Invalid project reference"}';
        }
        location ~ ^/_internal_api/projects/(?<slug>[^/]+)/members$ {
            internal;
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_set_header      X-User-Token $http_x_user_token;
            proxy_set_header      X-User-Groups $http_x_user_groups;
            proxy_set_header      X-User-Username $http_x_user_username;
            proxy_set_header      X-User-Display-Name $http_x_user_display_name;
            proxy_set_header      Remote-Groups $http_remote_groups;
            proxy_pass $server_domain/api/projects/$slug/members;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location ~ ^/_internal_api/projects/(?<slug>[^/]+)/rotate-key$ {
            internal;
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_set_header      X-User-Token $http_x_user_token;
            proxy_set_header      X-User-Groups $http_x_user_groups;
            proxy_set_header      X-User-Username $http_x_user_username;
            proxy_set_header      X-User-Display-Name $http_x_user_display_name;
            proxy_set_header      Remote-Groups $http_remote_groups;
            proxy_pass $server_domain/api/projects/$slug/rotate-key;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location ~ ^/api/projects/(?<slug>[^/]+)/members/(?<member_id>[^/]+)$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;

            access_by_lua_file /usr/local/openresty/lualib/security/check_authenticated.lua;
            if ($request_method != DELETE) {
                return 405;
            }
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_set_header      X-User-Token $auth_user_token;
            proxy_pass $server_domain/api/projects/$slug/members/$member_id;
        }
        
        location = /api/projects/duplicate {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups  $upstream_http_remote_groups;
            
            access_by_lua_file /usr/local/openresty/lualib/security/check_authenticated.lua;
            

            if ($request_method != "POST") {
                return 405;
            }
            
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_set_header      X-User-Token $auth_user_token;
            proxy_pass $server_domain/api/projects/duplicate;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        }
        
        
        location ~ ^/api/projects/(?<slug>[^/]+)/members$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups $upstream_http_remote_groups;
            access_by_lua_file /usr/local/openresty/lualib/security/check_authenticated.lua;

            if ($request_method = "GET"){
                content_by_lua_file /usr/local/openresty/lualib/admin_api/project_members.lua;
            }
            proxy_ssl_server_name on;
            proxy_ssl_name        $server_hostname;   
            proxy_set_header      Host $server_hostname;
            proxy_set_header      X-Shared-Token $nginx_shared_token;
            proxy_set_header      X-User-Token $auth_user_token;
            if ($request_method = "POST") {
                proxy_pass $server_domain/api/projects/$slug/members;
            }
        }
        location ~ ^/api/projects/(?<slug>[^/]+)/available-users$ {
            auth_request_set $authelia_email   $upstream_http_remote_email;
            auth_request_set $authelia_groups $upstream_http_remote_groups;

            access_by_lua_file /usr/local/openresty/lualib/security/check_authenticated.lua;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
