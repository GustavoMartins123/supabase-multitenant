name: Diagnose user avatar thumbnails

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  analyze:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/user-avatar-thumbnails
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Analyze Flutter and persist diagnostics
        working-directory: studio/seletor_de_projetos
        run: |
          flutter pub get >/dev/null
          set +e
          flutter analyze > /tmp/flutter-analyze.log 2>&1
          status=$?
          cp /tmp/flutter-analyze.log ../../.github/flutter-analyze-avatar.txt
          cd ../..
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/flutter-analyze-avatar.txt
          git commit -m "chore: capture flutter analyzer diagnostics" || true
          git push origin HEAD:agent/user-avatar-thumbnails
          exit "$status"
