name: Diagnose user avatar thumbnails

on:
  pull_request:
    branches:
      - main

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/user-avatar-thumbnails

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Analyze Flutter
        working-directory: studio/seletor_de_projetos
        run: |
          flutter pub get >/dev/null
          set +e
          flutter analyze > /tmp/flutter-analyze.log 2>&1
          status=$?
          grep -E '(^| )((error|warning|info) •|[0-9]+ issues? found)' /tmp/flutter-analyze.log | tail -n 80 || true
          exit "$status"
