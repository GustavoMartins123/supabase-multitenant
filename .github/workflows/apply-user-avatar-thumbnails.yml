name: Validate user avatar thumbnails

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/user-avatar-thumbnails

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Validate Flutter
        working-directory: studio/seletor_de_projetos
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos --no-fatal-warnings
          flutter build web --release

      - name: Validate contracts
        run: |
          python tests/smoke/test_user_avatar_thumbnails.py
          python tests/smoke/test_user_profile_contract.py
