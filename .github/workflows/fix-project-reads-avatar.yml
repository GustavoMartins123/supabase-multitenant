name: Fix project reads and avatar

on:
  push:
    branches:
      - agent/fix-project-reads-avatar

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-project-reads-avatar
      - name: Apply fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          main_path = Path('servidor/api-internal/app/main.py')
          main_source = main_path.read_text(encoding='utf-8')
          old_status = '''    async with pool.acquire() as conn:
                  auth_user = await resolve_authenticated_user(request, pool)
                  project_row = await get_project_row(conn, project_name)
                  await ensure_project_member_access(
                      conn,
                      project_id=project_row["id"],
                      auth_user=auth_user,
                  )
                  project_role = await get_project_role(
                      conn,
                      project_id=project_row["id"],
                      auth_user=auth_user,
                  )
          '''
          new_status = '''    auth_user = await resolve_authenticated_user(request, pool)
              async with pool.acquire() as conn:
                  project_row = await get_project_row(conn, project_name)
                  await ensure_project_member_access(
                      conn,
                      project_id=project_row["id"],
                      auth_user=auth_user,
                  )
                  project_role = await get_project_role(
                      conn,
                      project_id=project_row["id"],
                      auth_user=auth_user,
                  )
          '''
          if main_source.count(old_status) != 1:
              raise SystemExit('status connection block not found exactly once')
          main_path.write_text(main_source.replace(old_status, new_status), encoding='utf-8')

          nginx_path = Path('studio/nginx/nginx.conf')
          nginx_source = nginx_path.read_text(encoding='utf-8')
          old_route = '''        location ~ ^/api/projects/(?<slug>[^/]+)/status$ {
                      auth_request_set $authelia_email   $upstream_http_remote_email;
                      auth_request_set $authelia_groups  $upstream_http_remote_groups;
          
                      access_by_lua_file /usr/local/openresty/lualib/security/check_authenticated.lua;
          
                      if ($request_method != "GET") { return 405; }
                      proxy_ssl_server_name on;
                      proxy_ssl_name        $server_hostname;   
                      proxy_set_header      Host $server_hostname;
                      proxy_set_header      X-Shared-Token $nginx_shared_token;
                      proxy_set_header      X-User-Token $auth_user_token;
                      proxy_pass $server_domain/api/projects/$slug/status;
                  }
          '''
          new_route = '''        location ~ ^/api/projects/(?<slug>[^/]+)/(status|collaboration)$ {
                      auth_request_set $authelia_email   $upstream_http_remote_email;
                      auth_request_set $authelia_groups  $upstream_http_remote_groups;
          
                      access_by_lua_file /usr/local/openresty/lualib/security/check_authenticated.lua;
          
                      if ($request_method != "GET") { return 405; }
                      content_by_lua_file /usr/local/openresty/lualib/admin_api/project_read_proxy.lua;
                  }
          '''
          if nginx_source.count(old_route) != 1:
              raise SystemExit('nginx status route not found exactly once')
          nginx_path.write_text(nginx_source.replace(old_route, new_route), encoding='utf-8')

          dialog_path = Path('studio/seletor_de_projetos/lib/user_profile_dialog.dart')
          dialog_source = dialog_path.read_text(encoding='utf-8')
          old_reader = '''      if (result is ByteBuffer) {
                  completer.complete(Uint8List.view(result));
                } else {
                  completer.completeError(StateError('Arquivo inválido'));
                }
          '''
          new_reader = '''      if (result is Uint8List) {
                  completer.complete(result);
                } else if (result is ByteBuffer) {
                  completer.complete(Uint8List.view(result));
                } else if (result is List<int>) {
                  completer.complete(Uint8List.fromList(result));
                } else {
                  completer.completeError(StateError('Arquivo inválido'));
                }
          '''
          if dialog_source.count(old_reader) != 1:
              raise SystemExit('Flutter file reader block not found exactly once')
          dialog_path.write_text(dialog_source.replace(old_reader, new_reader), encoding='utf-8')

          dispatcher_path = Path('studio/nginx/lua/studio_compat/user_me_content.lua')
          dispatcher_source = dispatcher_path.read_text(encoding='utf-8')
          old_dispatch = '''if uri == "/api/user/me/avatar" then
              return require("admin_api.user_avatar_handler").handle()
          end
          '''
          new_dispatch = '''if uri == "/api/user/me/avatar"
              or uri:match("^/api/user/me/avatar/[0-9a-fA-F%-]+$") then
              return require("admin_api.user_avatar_handler").handle()
          end
          '''
          if dispatcher_source.count(old_dispatch) != 1:
              raise SystemExit('avatar dispatcher block not found exactly once')
          dispatcher_path.write_text(dispatcher_source.replace(old_dispatch, new_dispatch), encoding='utf-8')

          proxy_source = '''local http = require("resty.http")
          local cjson = require("cjson.safe")

          local INTERNAL_ORIGIN = "http://projects-api:18000"
          local EXTERNAL_ORIGIN = (os.getenv("SERVER_DOMAIN") or ""):gsub("/+$", "")
          local TOKEN = os.getenv("NGINX_SHARED_TOKEN") or ""
          local cache = ngx.shared.service_keys
          local unavailable_key = "projects-api:read-proxy:internal-unavailable"

          local function host_for(origin)
              return origin:match("//([^/:]+)") or "localhost"
          end

          local function request(origin)
              local client = http.new()
              client:set_timeout(3000)
              return client:request_uri(
                  origin .. (ngx.var.request_uri or ngx.var.uri or ""),
                  {
                      method = "GET",
                      ssl_verify = false,
                      headers = {
                          ["Accept"] = ngx.var.http_accept or "application/json",
                          ["Host"] = host_for(origin),
                          ["X-Shared-Token"] = TOKEN,
                          ["X-User-Token"] = ngx.var.auth_user_token or "",
                          ["User-Agent"] = "studio-nginx-internal/1.0",
                          ["X-Real-IP"] = ngx.var.remote_addr or "",
                          ["X-Forwarded-Proto"] = ngx.var.scheme or "https",
                      },
                  }
              )
          end

          local response
          local request_error
          local internal_unavailable = cache and cache:get(unavailable_key)

          if not internal_unavailable then
              response, request_error = request(INTERNAL_ORIGIN)
              if not response and cache then
                  cache:set(unavailable_key, true, 30)
              end
          end

          if not response and EXTERNAL_ORIGIN ~= "" and EXTERNAL_ORIGIN ~= INTERNAL_ORIGIN then
              response, request_error = request(EXTERNAL_ORIGIN)
          end

          if not response then
              ngx.status = ngx.HTTP_BAD_GATEWAY
              ngx.header.content_type = "application/json; charset=utf-8"
              ngx.say(cjson.encode({ error = request_error or "projects API unavailable" }))
              return ngx.exit(ngx.HTTP_BAD_GATEWAY)
          end

          local content_type = response.headers["Content-Type"] or response.headers["content-type"]
          if content_type then
              ngx.header["Content-Type"] = content_type
          else
              ngx.header.content_type = "application/json; charset=utf-8"
          end
          ngx.header["Cache-Control"] = "no-store"
          ngx.status = response.status
          ngx.print(response.body or "")
          return ngx.exit(response.status)
          '''
          Path('studio/nginx/lua/admin_api/project_read_proxy.lua').write_text(proxy_source, encoding='utf-8')

          test_source = '''from __future__ import annotations

          import pathlib
          import unittest

          ROOT = pathlib.Path(__file__).resolve().parents[2]


          class ProjectReadAndAvatarTests(unittest.TestCase):
              def test_status_resolves_user_before_acquiring_project_connection(self) -> None:
                  source = (ROOT / "servidor/api-internal/app/main.py").read_text(encoding="utf-8")
                  start = source.index('@app.get("/api/projects/{project_name}/status")')
                  end = source.index('@app.post("/api/projects/{project_name}/stop")', start)
                  block = source[start:end]
                  self.assertLess(
                      block.index("auth_user = await resolve_authenticated_user(request, pool)"),
                      block.index("async with pool.acquire() as conn:"),
                  )

              def test_status_and_collaboration_use_direct_read_proxy(self) -> None:
                  nginx = (ROOT / "studio/nginx/nginx.conf").read_text(encoding="utf-8")
                  self.assertIn("/(status|collaboration)$", nginx)
                  self.assertIn("project_read_proxy.lua", nginx)
                  proxy = (
                      ROOT / "studio/nginx/lua/admin_api/project_read_proxy.lua"
                  ).read_text(encoding="utf-8")
                  self.assertIn('INTERNAL_ORIGIN = "http://projects-api:18000"', proxy)
                  self.assertIn('os.getenv("SERVER_DOMAIN")', proxy)
                  self.assertIn('["X-User-Token"] = ngx.var.auth_user_token', proxy)
                  self.assertIn("ngx.var.request_uri", proxy)

              def test_flutter_accepts_the_uint8list_returned_by_file_reader(self) -> None:
                  source = (
                      ROOT / "studio/seletor_de_projetos/lib/user_profile_dialog.dart"
                  ).read_text(encoding="utf-8")
                  self.assertIn("if (result is Uint8List)", source)
                  self.assertIn("else if (result is ByteBuffer)", source)

              def test_avatar_uuid_route_reaches_avatar_handler(self) -> None:
                  source = (
                      ROOT / "studio/nginx/lua/studio_compat/user_me_content.lua"
                  ).read_text(encoding="utf-8")
                  self.assertIn('uri:match("^/api/user/me/avatar/[0-9a-fA-F%-]+$")', source)


          if __name__ == "__main__":
              unittest.main()
          '''
          Path('tests/smoke/test_project_read_avatar.py').write_text(test_source, encoding='utf-8')
          PY
      - name: Validate Python and contracts
        run: |
          python -m py_compile servidor/api-internal/app/main.py
          python tests/smoke/test_project_read_avatar.py
          python tests/smoke/test_user_profile_contract.py
      - name: Validate Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1
          luac5.1 -p studio/nginx/lua/admin_api/project_read_proxy.lua
          luac5.1 -p studio/nginx/lua/studio_compat/user_me_content.lua
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true
      - name: Validate Flutter
        working-directory: studio/seletor_de_projetos
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos --no-fatal-warnings
          flutter build web --release
      - name: Commit fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add servidor/api-internal/app/main.py studio/nginx/nginx.conf studio/nginx/lua/admin_api/project_read_proxy.lua studio/nginx/lua/studio_compat/user_me_content.lua studio/seletor_de_projetos/lib/user_profile_dialog.dart tests/smoke/test_project_read_avatar.py
          git commit -m "fix: restore project reads and avatar upload"
          git push origin HEAD:agent/fix-project-reads-avatar
