name: Apply project-aware Traefik guard

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/project-aware-traefik-guard
          fetch-depth: 0

      - name: Apply repository integration
        run: python .github/scripts/apply_project_guard_repo.py

      - name: Run Go tests
        working-directory: servidor/traefik/plugins-local/src/github.com/GustavoMartins123/supabaseguard
        run: go test ./...

      - name: Run Python contracts
        run: |
          python -m py_compile servidor/traefik/migrate_project_guard.py
          python tests/smoke/test_traefik_guard_migration.py
          python tests/smoke/test_traefik_guard_contract.py
          python tests/smoke/test_traefik_env_contract.py

      - name: Validate Compose
        run: |
          docker compose \
            -f servidor/traefik/docker-compose.yml \
            --env-file servidor/.env.example \
            config >/tmp/traefik-compose.yml

      - name: Validate plugin in Traefik
        run: |
          cat >/tmp/guard-static.yml <<'YAML'
          entryPoints:
            web:
              address: ":8080"
          providers:
            file:
              filename: /etc/traefik/dynamic.yml
          experimental:
            localPlugins:
              supabaseguard:
                moduleName: github.com/GustavoMartins123/supabaseguard
          log:
            level: DEBUG
          YAML

          cat >/tmp/guard-dynamic.yml <<'YAML'
          http:
            routers:
              guard-test:
                rule: PathPrefix(`/`)
                entryPoints:
                  - web
                middlewares:
                  - guard-test
                service: whoami
            middlewares:
              guard-test:
                plugin:
                  supabaseguard:
                    profile: project
                    mode: enforce
                    scope: test-project
            services:
              whoami:
                loadBalancer:
                  servers:
                    - url: http://supabaseguard-whoami:80
          YAML

          cleanup() {
            docker logs supabaseguard-traefik-test || true
            docker rm -f supabaseguard-traefik-test supabaseguard-whoami >/dev/null 2>&1 || true
            docker network rm supabaseguard-test >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker network create supabaseguard-test
          docker run -d --name supabaseguard-whoami --network supabaseguard-test traefik/whoami
          docker run -d --name supabaseguard-traefik-test \
            --network supabaseguard-test \
            -p 18080:8080 \
            -v "$PWD/servidor/traefik/plugins-local:/plugins-local:ro" \
            -v /tmp/guard-static.yml:/etc/traefik/traefik.yml:ro \
            -v /tmp/guard-dynamic.yml:/etc/traefik/dynamic.yml:ro \
            traefik:v3.7.6 --configFile=/etc/traefik/traefik.yml

          sleep 6
          docker ps --filter name=supabaseguard-traefik-test --filter status=running --format '{{.Names}}' | grep -qx supabaseguard-traefik-test
          for attempt in 1 2 3; do
            status=$(curl -sS -o /tmp/guard-response -w '%{http_code}' http://127.0.0.1:18080/)
            test "$status" = "200"
          done
          ! docker logs supabaseguard-traefik-test 2>&1 | grep -Eiq 'unknown plugin|failed to load plugin|error.*supabaseguard'

      - name: Commit integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            servidor/traefik/traefik.yml \
            servidor/traefik/middlewares.yml \
            servidor/traefik/docker-compose.yml \
            servidor/generateProject/dockercomposetemplate \
            servidor/.env.example
          git commit -m "feat(traefik): integrate project-aware Supabase Guard"
          git push origin HEAD:agent/project-aware-traefik-guard
