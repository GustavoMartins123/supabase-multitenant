name: Run studio API contract patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-studio-api-contract-user-activity
          fetch-depth: 0

      - name: Apply changes
        run: python .github/scripts/apply_studio_api_contract.py

      - name: Validate Python and contracts
        run: |
          python -m py_compile servidor/api-internal/app/main.py servidor/api-internal/app/database_schema.py
          python tests/smoke/test_user_profile_contract.py
          python tests/smoke/test_studio_api_transport_and_activity.py
          python tests/smoke/test_status_avatar_regressions.py

      - name: Validate Lua syntax
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1
          luac5.1 -p studio/nginx/lua/admin_api/user_sync.lua

      - name: Commit implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add servidor/api-internal/app/main.py \
            servidor/api-internal/app/database_schema.py \
            studio/nginx/lua/admin_api/user_sync.lua \
            tests/smoke/test_user_profile_contract.py \
            tests/smoke/test_studio_api_transport_and_activity.py \
            tests/integration/test_profile_via_traefik.py
          git commit -m "fix: enforce studio api route and user activity semantics"
          git push origin HEAD:agent/fix-studio-api-contract-user-activity
