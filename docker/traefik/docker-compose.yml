services:
  traefik:
    image: traefik:v3.3.5
    ports:
      - "80:80"   
      - "443:443"
      - "8082:8082"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  
      - ./traefik.yml:/etc/traefik/traefik.yml
      - ./acme.json:/acme.json 
    labels:
      - "traefik.enable=true"                       
      - "traefik.http.routers.dashboard.rule=Host(`localhost`) || Host(`127.0.0.1`) || Host(`<SEU_DOMINIO>`)"  # Regra para acessar o dashboard
      - "traefik.http.routers.dashboard.entrypoints=dashboard"
      - "traefik.http.routers.dashboard.service=api@internal" 
    networks:
      - rede-supabase
    restart: unless-stopped

networks:
  rede-supabase:
    external: true