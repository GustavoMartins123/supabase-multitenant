worker_processes auto;
events {
    worker_connections 1024;
}
http{
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;
    
    # Definições para roteamento dinâmico do PG Meta
    lua_package_path "/etc/nginx/lua/?.lua;;";

    resolver 127.0.0.11 valid=30s;
    map_hash_bucket_size 256;

    map $project_ref $auth_upstream {
        projeto           supabase-auth-projeto:9999;
    }

    map $project_ref $rest_upstream {
        projeto           supabase-rest-projeto:3000;
    }

    map $project_ref $storage_upstream {
        projeto           supabase-storage-projeto:5000;
    }

    map $project_ref $service_role_key {
        projeto           "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoicHJvamV0byIsImlhdCI6MTc0MDAyODgwMCwiZXhwIjoxOTk5NTM1NjAwfQ.HL3behP36XOjcTFgBwwap2xEqWwO29dOr9HUfOHy7cw";
    }

    map $project_ref $pg_meta_port {
            projeto   11233;             
    }

    map "" $functions_upstream{ default "functions:9000"; }
    map "" $realtime_upstream { default "realtime-dev.supabase-realtime:4000"; }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $scheme $hsts_header {
    https   "max-age=63072000; preload";
    }

    server {
        listen 4000;
        server_name studio.local;
        access_log /var/log/studio_access.log;
        error_log /var/log/studio_error.log debug;

        location /test {
            rewrite_by_lua_block {
                ngx.say("Lua está funcionando!")
                ngx.exit(200)
            }
        }

        location ~ ^/([^/]+)/project/([^/]+) {
            access_by_lua_block {
                local prefix = ngx.var[1]  -- Captura o prefixo da URL inicial
                local project = ngx.var[2] -- Captura o nome do projeto
                
                -- Criar um ID de sessão único (cookie ou IP)
                local session_id = ngx.var.cookie_supabase_session
                if not session_id then
                    -- Gerar ID baseado em IP + timestamp para maior unicidade
                    session_id = ngx.var.remote_addr .. "-" .. ngx.time()
                    -- Define cookie para futuros acessos
                    ngx.header["Set-Cookie"] = "supabase_session=" .. session_id .. "; Path=/; HttpOnly; Max-Age=86400"
                end
                
                -- Armazenar apenas o prefixo na sessão
                local session_dict = ngx.shared.session_to_project
                local session_data = prefix
                local success, err = session_dict:set(session_id, session_data, 86400) -- 24 horas TTL
                
                -- Log para debugging
                ngx.log(ngx.NOTICE, "Sessão iniciada: " .. session_id .. " -> Dados: " .. session_data .. 
                    " (Sucesso: " .. tostring(success) .. ", Erro: " .. tostring(err or "nenhum") .. ")")
                
                -- Redireciona para a URL sem o prefixo
                return ngx.redirect("/project/" .. project)
            }
        }
        
        set_by_lua_block $project_ref {
            local session_id = ngx.var.cookie_supabase_session
            if not session_id then
                ngx.log(ngx.ERR, "Nenhum cookie supabase_session encontrado")
                return "projeto"
            end

            local session_dict = ngx.shared.session_to_project
            local session_data = session_dict:get(session_id)
            if not session_data then
                ngx.log(ngx.ERR, "Nenhum dado de sessão encontrado para session_id: " .. session_id)
                return "projeto"
            end

            ngx.log(ngx.NOTICE, "Prefixo recuperado: " .. session_data .. " para session_id: " .. session_id)
            return session_data  -- Retorna diretamente o prefixo (ex.: "proit")
        }

        set $pg_meta_host "supabase-meta-${project_ref}";

        # Junta host + porta em uma única string
        set $pg_meta_target "$pg_meta_host:$pg_meta_port";


        location ~ ^/api/platform/pg-meta/([^/]+)(/.*)?$ {
            set $project_ref $1;
            set $resource $2;                 # /tables  | /columns/1 …

            rewrite_by_lua_block {
                local method = ngx.req.get_method()

                ngx.req.read_body()
                local data = ngx.req.get_body_data()
                local cjson = require "cjson.safe"


                local uri    = ngx.var.request_uri  -- inclui path + query
                -- bate exatamente contra o pattern
                if method == "GET"
                    and uri:match("^/api/platform/pg%-meta/default/policies%?included_schemas=&excluded_schemas=$")
                then
                    -- reescreve para /policies sem query
                    ngx.req.set_uri("/policies", false)
                    ngx.req.set_uri_args({})
                    return
                end

                local function convert_fields(obj)
                    if type(obj) ~= "table" then
                        return obj
                    end
                    
                    -- Mapeamento de campos camelCase para snake_case
                    local mappings = {
                        tableId = "table_id",
                        defaultValue = "default_value",
                        defaultValueFormat = "default_value_format",
                        isNullable = "is_nullable",
                        isUnique = "is_unique",
                        isGenerated = "is_generated",
                        isIdentity = "is_identity",



                        dataType             = "data_type",
                        ordinalPosition      = "ordinal_position",
                        identityGeneration   = "identity_generation",
                        isUpdatable          = "is_updatable",
                        dropDefault         = "drop_default",
                    }
                    
                    for camel, snake in pairs(mappings) do
                        if obj[camel] ~= nil then
                            obj[snake] = obj[camel]
                            obj[camel] = nil
                        end
                    end
                    
                    -- Processa recursivamente para objetos aninhados
                    for k, v in pairs(obj) do
                        if type(v) == "table" then
                            obj[k] = convert_fields(v)
                        end
                    end
                    
                    return obj
                end

                ngx.req.read_body()
                local data = ngx.req.get_body_data()
                if data and #data > 0 then
                    local cjson = require "cjson.safe"
                    local success, js = pcall(cjson.decode, data)
                    if success and js then
                        -- Converte campos camelCase para snake_case
                        js = convert_fields(js)
                        ngx.req.set_body_data(cjson.encode(js))
                    else
                        ngx.log(ngx.WARN, "Falha ao processar JSON: ", (js or "formato inválido"))
                    end
                end

                local args = ngx.req.get_uri_args()
                local id = args["id"]
                local keys
                if id then
                    -- Remove o parâmetro 'id' da query string
                    args["id"] = nil
                    
                    -- Constrói a nova URL com o ID no caminho
                    local project_ref = ngx.var.project_ref
                    local resource = ngx.var.resource
                    local new_uri = "/api/platform/pg-meta/" .. project_ref .. "/" .. resource .. "/" .. id
                    
                    -- Reconstrói a query string sem o parâmetro 'id'
                    local new_args = ngx.encode_args(args)
                    if new_args and new_args ~= "" then
                        new_uri = new_uri .. "?" .. new_args
                    end
                    
                    -- Redireciona para a nova URL
                    return ngx.redirect(new_uri, 307)
                end

            }

            proxy_pass http://$pg_meta_target$resource$is_args$args;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        #para ver se guardou a sessão
        location /internal/session-debug {
            access_by_lua_block {
                local session_id = ngx.var.cookie_supabase_session or (ngx.var.remote_addr .. "-*")
                local session_dict = ngx.shared.session_to_project
                local prefix = session_dict:get(session_id) or "não encontrado"
                
                ngx.say("Sessão atual: " .. session_id)
                ngx.say("Prefixo mapeado: " .. prefix)
                
                if prefix ~= "não encontrado" then
                    local pg_meta_server
                    if prefix == "projeto" then
                        pg_meta_server = "meta:11233"
                    else
                        pg_meta_server = "supabase-meta-" .. prefix .. ":11233"
                    end
                    ngx.say("Servidor PG Meta: " .. pg_meta_server)
                end
                
                return ngx.exit(ngx.HTTP_OK)
            }
        }

        location ~ ^/api/platform/projects/[^/]+/run-lints$ {
            default_type application/json;
            add_header   Cache-Control "no-store";
            return 200 '[]';
        }

        location /api/platform/auth {
            proxy_set_header Authorization "Bearer $service_role_key";

            access_by_lua_block {
                local method = ngx.var.request_method
                local uri = ngx.var.uri
                local user_id = uri:match("^/api/platform/auth/default/users/(.+)$")

                if method == "POST" and not user_id then
                    ngx.req.set_uri("/signup")
                elseif method == "DELETE" and user_id then
                    ngx.req.set_uri("/admin/users/" .. user_id)
                elseif method == "PATCH" and user_id then
                    ngx.req.set_uri("/admin/users/" .. user_id)
                    ngx.req.set_method(ngx.HTTP_PUT)
                else
                    ngx.status = ngx.HTTP_BAD_REQUEST
                    ngx.say("Requisição inválida para " .. method .. " em " .. uri)
                    return ngx.exit(ngx.HTTP_BAD_REQUEST)
                end
            }

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass http://$auth_upstream;

            
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }
        

        location /api/platform/storage {
            proxy_set_header Authorization "Bearer $service_role_key";
            rewrite ^/api/platform/storage/default/buckets$ /bucket break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9]+)$ /bucket/$1 break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9]+)/empty$ /bucket/$1/empty break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9_-]+)/objects/sign$ /object/sign/$1 break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9]+)/objects/list$ /object/list/$1 break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9_-]+)/objects$ /object/$1 break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9_-]+)/objects/move$ /object/move/$1 break;

            rewrite_by_lua_block {
                ngx.req.read_body()
                local data = ngx.req.get_body_data()

                if data then
                    local cjson = require "cjson"
                    local success, body = pcall(cjson.decode, data)
                    if success and body then
                        if ngx.var.request_method == "POST" and ngx.var.uri == "/bucket" then
                            if body.id then
                                body.name = body.id
                                body.id = nil
                            end
                        end
                        if ngx.var.request_method == "POST" and ngx.re.match(ngx.var.uri, "^/object/list/") then
                            if body.path then
                                body.prefix = body.path
                                body.path = nil
                            end
                        end
                        if ngx.var.request_method == "DELETE" and ngx.re.match(ngx.var.uri, "^/object/[a-zA-Z0-9_-]+$") then
                            if body.paths then
                                body.prefixes = body.paths
                                body.paths = nil
                            end
                        end
                        -- Para atualizar uma bucket existente, pois o storage espera um 'put' e não um patch 'https://supabase.github.io/storage/#/'
                        if ngx.var.request_method == "PATCH" and ngx.re.match(ngx.var.uri, "^/bucket/[a-zA-Z0-9]+$") then
                            ngx.req.set_method(ngx.HTTP_PUT)
                        end

                        if ngx.var.request_method == "POST" and ngx.re.match(ngx.var.uri, "^/object/move") then
                            if body.from and body.to then
                                -- Capturar o bucketId da URI original antes do rewrite
                                local uri_captures = ngx.re.match(ngx.var.request_uri, "/api/platform/storage/default/buckets/([^/]+)/objects/move")
                                local bucketId = uri_captures and uri_captures[1]
                                
                                if bucketId then
                                    -- Monta o novo payload
                                    body = {
                                        bucketId = bucketId,
                                        sourceKey = body.from,
                                        destinationBucket = bucketId,
                                        destinationKey = body.to
                                    }
                                    ngx.log(ngx.INFO, "Payload reorganizado para /object/move: ", cjson.encode(body))
                                    
                                    -- Garantir que a URI seja exatamente /object/move
                                    if ngx.var.uri ~= "/object/move" then
                                        ngx.req.set_uri("/object/move")
                                    end
                                else
                                    ngx.log(ngx.ERR, "Não foi possível extrair bucketId da URL: ", ngx.var.request_uri)
                                end
                            end
                        end

                        ngx.req.set_body_data(cjson.encode(body))
                    else
                        ngx.log(ngx.ERR, "Falha ao decodificar o corpo da requisição: ", data)
                    end
                end
            }
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass http://$storage_upstream;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }

        location /object/sign {
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass http://$storage_upstream;

            # 
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }

        location /realtime/v1/websocket {
            

            proxy_set_header Authorization "Bearer $service_role_key";
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;
            
            rewrite ^/realtime/v1/websocket$ /socket/$1 break;
            proxy_pass http://realtime-dev.supabase-realtime:4000;

            
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }

        location /storage/v1 {
            rewrite ^/storage/v1/(.*)$ /$1 break;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass http://$storage_upstream;

            # 
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }

        location /api/platform/projects/default/api/rest {
            rewrite ^/api/platform/projects/default/api/rest$ /$1 break;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass http://$rest_upstream;

            
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass http://studio:3000;

            
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }
    }
}