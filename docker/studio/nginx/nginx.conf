worker_processes auto;
events {
    worker_connections 1024;
}
http{
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;
    
    # Definições para roteamento dinâmico do PG Meta
    lua_package_path "/etc/nginx/lua/?.lua;;";

    resolver 127.0.0.11 valid=30s;
    map_hash_bucket_size 256;

    map "" $auth_upstream     { default "supabase-auth-{PROJECT_ID}:9999"; }
    map "" $rest_upstream     { default "supabase-rest-{PROJECT_ID}:3000"; }
    map "" $storage_upstream  { default "supabase-storage-{PROJECT_ID}:5000"; }
    map "" $functions_upstream{ default "functions:9000"; }
    map "" $realtime_upstream { default "realtime-dev.supabase-realtime:4000"; }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $scheme $hsts_header {
    https   "max-age=63072000; preload";
    }

    server {
        listen 4000;
        server_name studio.local;
        set $service_role_key "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoiZGF0YWJhc2UiLCJpYXQiOjE3NDAwMjg4MDAsImV4cCI6MTk5OTUzNTYwMH0.jt6FM_74qmRBKwG8pmwLFWOUkGVerWsg6Yha1OVlVU0";
        access_log /var/log/studio_access.log;
        error_log /var/log/studio_error.log debug;

        location /test {
            rewrite_by_lua_block {
                ngx.say("Lua está funcionando!")
                ngx.exit(200)
            }
        }

        location ~ ^/([^/]+)/project/([^/]+) {
            access_by_lua_block {
                local prefix = ngx.var[1]  -- Captura o prefixo da URL inicial
                local project = ngx.var[2] -- Captura o nome do projeto
                
                -- Criar um ID de sessão único (cookie ou IP)
                local session_id = ngx.var.cookie_supabase_session
                if not session_id then
                    -- Gerar ID baseado em IP + timestamp para maior unicidade
                    session_id = ngx.var.remote_addr .. "-" .. ngx.time()
                    -- Define cookie para futuros acessos
                    ngx.header["Set-Cookie"] = "supabase_session=" .. session_id .. "; Path=/; HttpOnly; Max-Age=86400"
                end
                
                -- Armazenar o prefixo associado a esta sessão
                local session_dict = ngx.shared.session_to_project
                local success, err, forcible = session_dict:set(session_id, prefix, 86400) -- 24 horas TTL
                
                -- Log para debugging
                ngx.log(ngx.NOTICE, "Sessão iniciada: " .. session_id .. " -> Projeto: " .. prefix .. 
                    " (Sucesso: " .. tostring(success) .. ", Erro: " .. tostring(err or "nenhum") .. ")")
                
                -- Redireciona para a URL sem o prefixo
                return ngx.redirect("/project/" .. project)
            }
        }
        
        # Interceptar chamadas para o PG Meta API
        location ~ ^/api/platform/pg-meta/(.*)$ {

            set_by_lua_block $pg_meta_host {
                local sid   = ngx.var.cookie_supabase_session or ngx.var.remote_addr
                local pref  = ngx.shared.session_to_project:get(sid) or "default"
                return (pref == "default")
                    and "meta:8080"
                    or  ("supabase-meta-" .. pref .. ":8180")
            }

            # 2) remove "/api/platform/pg-meta/<slug>/" da URI --------
            rewrite ^/api/platform/pg-meta/[^/]+/(.*)$ /$1 break;

            # 3) envia só "/query …", "/types …" ao pg-meta -----------
            proxy_pass http://$pg_meta_host;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Tratamento de erro para servidor não encontrado
            proxy_intercept_errors on;
            error_page 502 504 = @pg_meta_fallback;
        }
        
        # Fallback para quando o servidor PG Meta não for encontrado
        location @pg_meta_fallback {
            proxy_pass http://meta:8080;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /internal/session-debug {
            access_by_lua_block {
                local session_id = ngx.var.cookie_supabase_session or (ngx.var.remote_addr .. "-*")
                local session_dict = ngx.shared.session_to_project
                local prefix = session_dict:get(session_id) or "não encontrado"
                
                ngx.say("Sessão atual: " .. session_id)
                ngx.say("Prefixo mapeado: " .. prefix)
                
                if prefix ~= "não encontrado" then
                    local pg_meta_server
                    if prefix == "default" then
                        pg_meta_server = "meta:8080"
                    else
                        pg_meta_server = "supabase-meta-" .. prefix .. ":8080"
                    end
                    ngx.say("Servidor PG Meta: " .. pg_meta_server)
                end
                
                return ngx.exit(ngx.HTTP_OK)
            }
        }



        location /api/platform/auth {
            proxy_set_header Authorization "Bearer $service_role_key";

            access_by_lua_block {
                local method = ngx.var.request_method
                local uri = ngx.var.uri
                local user_id = uri:match("^/api/platform/auth/default/users/(.+)$")

                if method == "POST" and not user_id then
                    ngx.req.set_uri("/signup")
                elseif method == "DELETE" and user_id then
                    ngx.req.set_uri("/admin/users/" .. user_id)
                elseif method == "PATCH" and user_id then
                    ngx.req.set_uri("/admin/users/" .. user_id)
                    ngx.req.set_method(ngx.HTTP_PUT)
                else
                    ngx.status = ngx.HTTP_BAD_REQUEST
                    ngx.say("Requisição inválida para " .. method .. " em " .. uri)
                    return ngx.exit(ngx.HTTP_BAD_REQUEST)
                end
            }

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass http://$auth_upstream;

            
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }
        

        location /api/platform/storage {
            proxy_set_header Authorization "Bearer $service_role_key";
            rewrite ^/api/platform/storage/default/buckets$ /bucket break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9]+)$ /bucket/$1 break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9]+)/empty$ /bucket/$1/empty break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9_-]+)/objects/sign$ /object/sign/$1 break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9]+)/objects/list$ /object/list/$1 break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9_-]+)/objects$ /object/$1 break;
            rewrite ^/api/platform/storage/default/buckets/([a-zA-Z0-9_-]+)/objects/move$ /object/move/$1 break;

            rewrite_by_lua_block {
                ngx.req.read_body()
                local data = ngx.req.get_body_data()

                if data then
                    local cjson = require "cjson"
                    local success, body = pcall(cjson.decode, data)
                    if success and body then
                        if ngx.var.request_method == "POST" and ngx.var.uri == "/bucket" then
                            if body.id then
                                body.name = body.id
                                body.id = nil
                            end
                        end
                        if ngx.var.request_method == "POST" and ngx.re.match(ngx.var.uri, "^/object/list/") then
                            if body.path then
                                body.prefix = body.path
                                body.path = nil
                            end
                        end
                        if ngx.var.request_method == "DELETE" and ngx.re.match(ngx.var.uri, "^/object/[a-zA-Z0-9_-]+$") then
                            if body.paths then
                                body.prefixes = body.paths
                                body.paths = nil
                            end
                        end
                        -- Para atualizar uma bucket existente, pois o storage espera um 'put' e não um patch 'https://supabase.github.io/storage/#/'
                        if ngx.var.request_method == "PATCH" and ngx.re.match(ngx.var.uri, "^/bucket/[a-zA-Z0-9]+$") then
                            ngx.req.set_method(ngx.HTTP_PUT)
                        end

                        if ngx.var.request_method == "POST" and ngx.re.match(ngx.var.uri, "^/object/move") then
                            if body.from and body.to then
                                -- Capturar o bucketId da URI original antes do rewrite
                                local uri_captures = ngx.re.match(ngx.var.request_uri, "/api/platform/storage/default/buckets/([^/]+)/objects/move")
                                local bucketId = uri_captures and uri_captures[1]
                                
                                if bucketId then
                                    -- Monta o novo payload
                                    body = {
                                        bucketId = bucketId,
                                        sourceKey = body.from,
                                        destinationBucket = bucketId,
                                        destinationKey = body.to
                                    }
                                    ngx.log(ngx.INFO, "Payload reorganizado para /object/move: ", cjson.encode(body))
                                    
                                    -- Garantir que a URI seja exatamente /object/move
                                    if ngx.var.uri ~= "/object/move" then
                                        ngx.req.set_uri("/object/move")
                                    end
                                else
                                    ngx.log(ngx.ERR, "Não foi possível extrair bucketId da URL: ", ngx.var.request_uri)
                                end
                            end
                        end

                        ngx.req.set_body_data(cjson.encode(body))
                    else
                        ngx.log(ngx.ERR, "Falha ao decodificar o corpo da requisição: ", data)
                    end
                end
            }
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass http://$storage_upstream;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }

        location /object/sign {
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass http://$storage_upstream;

            # 
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }

        location /realtime/v1/websocket {
            

            proxy_set_header Authorization "Bearer $service_role_key";
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;
            
            rewrite ^/realtime/v1/websocket$ /socket/$1 break;
            proxy_pass http://realtime-dev.supabase-realtime:4000;

            
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }

        location /storage/v1 {
            rewrite ^/storage/v1/(.*)$ /$1 break;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass http://$storage_upstream;

            # 
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }

        location /api/platform/projects/default/api/rest {
            rewrite ^/api/platform/projects/default/api/rest$ /$1 break;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass http://$rest_upstream;

            
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Scheme $scheme;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass http://studio:3000;

            
            proxy_set_header Connection $http_connection;
            proxy_http_version 1.1;
        }
    }
}